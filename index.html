<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SOLARIS Web Prototype v7</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; background:radial-gradient(circle at center,#272016 0%,#100d09 75%); color:#fff3cf; font-family:Arial,Helvetica,sans-serif; display:grid; place-items:center; overflow:hidden; }
  .app { width:min(92vw,760px); height:min(92vw,760px); max-height:92vh; aspect-ratio:1/1; position:relative; user-select:none; }
  canvas { width:100%; height:100%; display:block; border-radius:50%; }
  video { display:none; }
  .toolbar { position:fixed; left:16px; bottom:16px; right:16px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  button,label { background:rgba(255,255,255,.08); color:#fff3cf; border:1px solid rgba(255,255,255,.22); padding:10px 14px; border-radius:999px; cursor:pointer; backdrop-filter:blur(8px); font-size:14px; }
  button:hover,label:hover { background:rgba(255,255,255,.16); }
  input[type=file] { display:none; }
  .hint { position:fixed; top:14px; left:14px; right:14px; text-align:center; color:rgba(255,243,207,.75); font-size:13px; pointer-events:none; }

  @media (max-width: 700px) {
    .hint {
      font-size: 11px;
      top: max(8px, env(safe-area-inset-top));
      padding: 0 14px;
    }
    .app {
      width: min(98vw, 98vh);
      height: min(98vw, 98vh);
      transform: translateY(-18px);
    }
    .toolbar {
      bottom: max(8px, env(safe-area-inset-bottom));
      gap: 6px;
    }
    button, label {
      font-size: 12px;
      padding: 8px 10px;
    }
  }

</style>
</head>

<div class="toolbar">

function drawDialLabels(){
  let list=uiMode===0?processes.map(p=>p.name):cp().params.map(p=>p.name),
      sel=uiMode===0?processIndex:paramIndex,
      n=list.length;

  for(let i=0;i<n;i++){
    let rel=i-sel;
    if(rel>n/2)rel-=n;
    if(rel<-n/2)rel+=n;

    // Raise the label arc slightly upward.
    let a=(-90+rel*30)*Math.PI/180,
        r=248,
        x=C+Math.cos(a)*r,
        y=C+Math.sin(a)*r-26,
        dist=Math.abs(rel);

    if(dist>4)continue;

    let selected=i===sel;
    let alpha=selected?1:clamp(.56-dist*.10,.18,.50);
    let size=selected?25:Math.max(12,17-dist*1.1);
    let color=selected?'#f0b64f':'#f5ead0';

    ctx.save();
    if(!selected){
      ctx.filter='blur('+(dist*.45+0.25)+'px)';
    }
    textCenter(list[i],x,y,size,'bold',color,alpha);
    ctx.restore();
  }

function rotateDial(direction,step){if(uiMode===0){processIndex=(processIndex-direction+processes.length)%processes.length;paramIndex=0}else if(uiMode===1){let ps=cp().params;paramIndex=(paramIndex-direction+ps.length)%ps.length}else{cp().active=true;let par=cpar(),st=par.max===10?1:step;par.value=clamp(par.value+direction*st,par.min,par.max)}showOverlay();drawFrame()}
function centerPress(){
  if(uiMode===0){
    if(cp().random){
      mutateRecipe();
      return;
    }
    uiMode=1;
    paramIndex=0;
  }else if(uiMode===1){
    cp().active=true;
    uiMode=2;
  }else{
    uiMode=1;
  }
  showOverlay(1100);
  drawFrame();
}
function backToEffects(){uiMode=0;showOverlay(900);drawFrame()}
function resetCurrentParameter(){
  if(uiMode===2){
    let par=currentParam();
    par.value=par.def;
    showOverlay(1000);
    drawFrame();
  } else {
    resetAllParameters();
  }
}
function resetAllParameters(){
  processes.forEach(p=>{
    p.active=false;
    if(p.params){
      p.params.forEach(par=>par.value=par.def);
    }
  });
  grainSeed=12345;
  noiseSeed=67890;
  uiMode=0;
  showOverlay(1100);
  drawFrame();
}
function mutateRecipe(){
  // RANDOM mutates the full recipe, not only the selected effect.
  // It activates and changes several real processes at once.
  let real=processes.filter(p=>!p.random);
  let changes=2+Math.floor(Math.random()*4);
  for(let c=0;c<changes;c++){
    let p=real[Math.floor(Math.random()*real.length)];
    p.active=true;
    let par=p.params[Math.floor(Math.random()*p.params.length)];
    let range=par.max-par.min;
    let step=range<=10?1:(Math.random()<.5?10:15);
    let dir=Math.random()<.5?-1:1;
    let before=par.value;
    par.value=clamp(par.value+dir*step,par.min,par.max);
    if(par.value===before){
      par.value=clamp(par.value-dir*step,par.min,par.max);
    }
  }
  grainSeed=Math.floor(Math.random()*2000000000)+1;
  noiseSeed=Math.floor(Math.random()*2000000000)+1;
  showOverlay(900);
  drawFrame();
}function startMutation(){if(mutateTimer)return;mutateRecipe();mutateTimer=setInterval(mutateRecipe,170)}function stopMutation(){if(holdTimer){clearTimeout(holdTimer);holdTimer=null}if(mutateTimer){clearInterval(mutateTimer);mutateTimer=null}}

let touchDialActive=false;
let touchLastAngle=0;
let touchAccum=0;
let touchMoved=false;

function angleFromPoint(clientX, clientY){
  let r=canvas.getBoundingClientRect();
  let x=(clientX-r.left)/r.width*W-C;
  let y=(clientY-r.top)/r.height*H-C;
  return Math.atan2(y,x);
}
function signedAngleDelta(a,b){
  let d=a-b;
  while(d>Math.PI)d-=Math.PI*2;
  while(d<-Math.PI)d+=Math.PI*2;
  return d;
}
function isInsideCanvasCircle(clientX, clientY){
  let r=canvas.getBoundingClientRect();
  let x=(clientX-r.left)/r.width*W;
  let y=(clientY-r.top)/r.height*H;
  return Math.hypot(x-C,y-C)<imageDiameter/2;
}

// Touch/drag dial for phone.
// Drag around the circle clockwise/counterclockwise.
// Small angular movement = 1 step, fast/bigger movement = repeated steps.
canvas.addEventListener('pointerdown',e=>{
  if(e.pointerType==='mouse')return;
  canvas.setPointerCapture(e.pointerId);
  touchDialActive=true;
  touchMoved=false;
  touchLastAngle=angleFromPoint(e.clientX,e.clientY);
  touchAccum=0;

  let r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*W,y=(e.clientY-r.top)/r.height*H;
  if(Math.hypot(x-C,y-C)<imageDiameter/2){
    if(uiMode===0){
      holdTimer=setTimeout(()=>{suppressClick=true;resetAllParameters()},520);
    } else if(uiMode===2){
      holdTimer=setTimeout(()=>{suppressClick=true;resetCurrentParameter()},520);
    }
  }
});

canvas.addEventListener('pointermove',e=>{
  if(!touchDialActive || e.pointerType==='mouse')return;
  e.preventDefault();

  let a=angleFromPoint(e.clientX,e.clientY);
  let d=signedAngleDelta(a,touchLastAngle);
  touchLastAngle=a;
  touchAccum+=d;

  if(Math.abs(touchAccum)>0.055){
    touchMoved=true;
    if(holdTimer){clearTimeout(holdTimer);holdTimer=null}
    let dir=touchAccum>0?-1:1;
    let step=Math.abs(touchAccum)>0.14?10:3;
    rotateDial(dir,step);
    touchAccum=0;
  }
},{passive:false});

canvas.addEventListener('pointerup',e=>{
  if(e.pointerType==='mouse')return;
  touchDialActive=false;
  if(holdTimer){clearTimeout(holdTimer);holdTimer=null}
  stopMutation();
  if(touchMoved){
    suppressClick=true;
    setTimeout(()=>suppressClick=false,80);
  }
});

canvas.addEventListener('pointercancel',e=>{
  touchDialActive=false;
  if(holdTimer){clearTimeout(holdTimer);holdTimer=null}
  stopMutation();
});

canvas.addEventListener('wheel',e=>{e.preventDefault();let now=performance.now(),dt=now-lastWheelTime;lastWheelTime=now;let dir=e.deltaY<0?1:-1,step=(dt<85||Math.abs(e.deltaY)>70)?10:3;rotateDial(dir,step)},{passive:false});canvas.addEventListener('mousedown',e=>{
  let r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*W,y=(e.clientY-r.top)/r.height*H;
  if(Math.hypot(x-C,y-C)<imageDiameter/2){
    if(uiMode===0){
      holdTimer=setTimeout(()=>{suppressClick=true;resetAllParameters()},520);
    } else if(uiMode===2){
      holdTimer=setTimeout(()=>{suppressClick=true;resetCurrentParameter()},520);
    }
  }
});
window.addEventListener('mouseup',()=>{stopMutation()});canvas.addEventListener('click',e=>{if(suppressClick){suppressClick=false;return}let r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*W,y=(e.clientY-r.top)/r.height*H;if(Math.hypot(x-C,y-C)<imageDiameter/2)centerPress()});document.getElementById('modeBtn').onclick=centerPress;document.getElementById('mutateBtn').onclick=mutateRecipe;document.getElementById('backBtn').onclick=backToEffects;document.getElementById('resetBtn').onclick=()=>{let p=cpar();p.value=p.def;showOverlay(1000);drawFrame()};document.getElementById('saveBtn').onclick=()=>{let im=processImage(),out=document.createElement('canvas');out.width=out.height=imageDiameter;let ox=out.getContext('2d');ox.save();ox.beginPath();ox.arc(imageDiameter/2,imageDiameter/2,imageDiameter/2,0,Math.PI*2);ox.clip();ox.drawImage(im,0,0);ox.restore();let link=document.createElement('a');link.download=`solaris_${cp().name.toLowerCase()}.png`;link.href=out.toDataURL('image/png');link.click()};document.getElementById('captureBtn').onclick=()=>{if(liveMode){updateLiveSource();frozen=!frozen;document.getElementById('captureBtn').textContent=frozen?'Resume Live':'Freeze Frame';showOverlay(900);drawFrame()}};document.getElementById('cameraBtn').onclick=async()=>{try{if(!liveMode){liveStream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},facingMode:'environment'},audio:false});video.srcObject=liveStream;liveMode=true;frozen=false;document.getElementById('cameraBtn').textContent='Stop Webcam';document.getElementById('captureBtn').textContent='Freeze Frame';showOverlay(1100);drawFrame()}else{liveStream?.getTracks().forEach(t=>t.stop());liveStream=null;liveMode=false;frozen=false;document.getElementById('cameraBtn').textContent='Start Webcam';document.getElementById('captureBtn').textContent='Freeze Frame';showOverlay(900);drawFrame()}}catch(err){alert('Camera access failed. Try Chrome/Firefox, or run from localhost if your browser blocks webcam access on local files.')}};fileInput.addEventListener('change',()=>{let file=fileInput.files[0];if(!file)return;if(liveMode){liveStream?.getTracks().forEach(t=>t.stop());liveStream=null;liveMode=false;frozen=false;document.getElementById('cameraBtn').textContent='Start Webcam';document.getElementById('captureBtn').textContent='Freeze Frame'}let img=new Image();img.onload=()=>{sourceCanvas.width=img.width;sourceCanvas.height=img.height;sourceCtx.drawImage(img,0,0);showOverlay(900);drawFrame()};img.src=URL.createObjectURL(file)});document.addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();centerPress()}if(e.key==='Escape'||e.key==='Backspace'){e.preventDefault();backToEffects()}if(e.key.toLowerCase()==='o')fileInput.click();if(e.key.toLowerCase()==='r'){resetCurrentParameter()}if(e.key.toLowerCase()==='s')document.getElementById('saveBtn').click();if(e.key.toLowerCase()==='m')mutateRecipe()});createDefaultImage();showOverlay(900);drawFrame();
</script>
