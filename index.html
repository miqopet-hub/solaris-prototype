<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sira ESP-P4 Fidelity Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#030303;color:#f3d88c;font-family:Arial,Helvetica,sans-serif;touch-action:none;-webkit-user-select:none;user-select:none}
body{display:grid;place-items:center}
#screen{width:min(100vmin,900px);height:min(100vmin,900px);display:block;touch-action:none;cursor:pointer}
#video{display:none}
.hint{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;text-align:center;color:rgba(240,210,140,.66);font-size:12px;letter-spacing:.04em;pointer-events:none;text-shadow:0 2px 10px #000}
.toolbar{position:fixed;left:10px;right:10px;bottom:max(10px,env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}
button,label,select{background:rgba(14,12,8,.72);color:#f3d88c;border:1px solid rgba(218,166,75,.34);border-radius:999px;padding:8px 11px;font-size:12px;backdrop-filter:blur(8px);cursor:pointer}
input[type=file]{display:none}
.badge{position:fixed;right:12px;top:max(36px,calc(env(safe-area-inset-top) + 28px));font-size:11px;color:rgba(240,210,140,.72);background:rgba(0,0,0,.45);border:1px solid rgba(218,166,75,.25);border-radius:999px;padding:7px 10px;pointer-events:none}
@media(max-width:700px){#screen{width:104vmin;height:104vmin;transform:translateY(-16px)}.toolbar{gap:5px}button,label,select{font-size:11px;padding:7px 9px}.hint{font-size:11px}}
</style>
</head>
<body>
<div class="hint">ESP-P4 SIM · preview 160/240/320 · save 1000 true redraw · slow 1 / fast 5 / faster 10</div>
<canvas id="screen" width="900" height="900"></canvas>
<video id="video" autoplay playsinline muted></video>
<div class="badge" id="perf">ESP 240 · -- ms</div>
<div class="toolbar">
  <label>Upload<input id="fileInput" type="file" accept="image/*"></label>
  <button id="cameraBtn">Camera</button>
  <button id="freezeBtn">Freeze</button>
  <select id="resSel" title="Internal processing resolution">
    <option value="160">160</option>
    <option value="240" selected>240</option>
    <option value="320">320</option>
  </select>
  <button id="rgb565Btn">RGB565 ON</button>
  <button id="resetBtn">Reset</button>
  <button id="saveBtn">Save 1000 PNG</button>
</div>

<script>
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d', { willReadFrequently:true });
const video = document.getElementById('video');
const fileInput = document.getElementById('fileInput');
const W=900,H=900,C=450,screenR=250;
let P = 240;
let simulateRGB565 = true;
let sourceCanvas = document.createElement('canvas');
let sourceCtx = sourceCanvas.getContext('2d',{willReadFrequently:true});
let liveMode=false, liveStream=null, frozen=false;
let processIndex=0, paramIndex=0, uiMode='effects';
let stack=[], draft=null;
let dialRotation=0, targetDialRot=0;
let overlayUntil=0, lastWheelTime=0, holdTimer=null, suppressClick=false, holdStart=0, holdDuration=760, holdLabel='', shakeUntil=0, feedbackMsg='', feedbackUntil=0, resetFlashUntil=0;
let grainSeed=12345, noiseSeed=67890;
let lastFrameMS=0, lastFpsUpdate=0;

const processes=[
  {name:'DITHER',params:[
    {name:'AMOUNT',value:50,def:50,min:0,max:100,step:1},
    {name:'COLOR',value:0,def:0,min:0,max:10,step:1},
    {name:'DIFFUSE',value:50,def:50,min:0,max:100,step:1}
  ]},
  {name:'HALFTONE',params:[
    {name:'SIZE',value:50,def:50,min:0,max:100,step:1},
    {name:'ANGLE',value:50,def:50,min:0,max:100,step:1},
    {name:'PALETTE',value:0,def:0,min:0,max:10,step:1}
  ]},
  {name:'POSTERIZE',params:[
    {name:'LEVELS',value:50,def:50,min:0,max:100,step:1},
    {name:'PALETTE',value:0,def:0,min:0,max:100,step:1}
  ]},
  {name:'CRT/RGB',params:[
    {name:'SPLIT',value:50,def:50,min:0,max:100,step:1},
    {name:'SCAN',value:50,def:50,min:0,max:100,step:1}
  ]},
  {name:'NOISE',params:[
    {name:'B&W',value:50,def:50,min:0,max:100,step:1},
    {name:'COLOR',value:50,def:50,min:0,max:100,step:1}
  ]},
  {name:'INVERT',params:[
    {name:'MIX',value:50,def:50,min:0,max:100,step:1}
  ]}
];

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function cp(){return processes[processIndex]}
function cpar(){return cp().params[paramIndex]}
function showOverlay(ms=850){overlayUntil=performance.now()+ms}
function rnd(s){s.value=(s.value*16807)%2147483647;return(s.value-1)/2147483646}
function makeCanvas(w,h=w){let c=document.createElement('canvas');c.width=w;c.height=h;return c}
function cloneParams(params){return params.map(p=>({name:p.name,value:p.value,def:p.def,min:p.min,max:p.max,step:p.step}))}
function neutralEffect(proc){return {name:proc.name,params:cloneParams(proc.params)}}
function cloneEntry(e){return {name:e.name,params:cloneParams(e.params)}}
function findStackIndex(name){return stack.findIndex(e=>e.name===name)}
function getEditableEffect(proc){
  const idx=findStackIndex(proc.name);
  if(idx>=0){
    const e=cloneEntry(stack[idx]);
    e.editIndex=idx;
    return e;
  }
  const e=neutralEffect(proc);
  e.editIndex=-1;
  return e;
}
function upsertDraftToStack(){
  if(!draft) return true;
  const entry={name:draft.name,params:cloneParams(draft.params)};
  const existing=findStackIndex(entry.name);

  if(existing>=0){
    stack[existing]=entry;
    draft=cloneEntry(entry);
    draft.editIndex=existing;
    return true;
  }

  if(stack.length>=3){
    triggerFeedback('MAX 3 EFFECTS');
    return false;
  }

  stack.push(entry);
  draft=cloneEntry(entry);
  draft.editIndex=stack.length-1;
  return true;
}

function paramValue(entry,name){const p=entry.params.find(x=>x.name===name);return p?p.value:0}
function setParamValue(entry,name,v){const p=entry.params.find(x=>x.name===name);if(p)p.value=clamp(v,p.min,p.max)}
function currentParamFromDraft(){if(!draft)draft=getEditableEffect(cp());return draft.params[paramIndex]||draft.params[0]}

function triggerFeedback(msg='STACK MAX 3'){
  feedbackMsg=msg;
  feedbackUntil=performance.now()+900;
  shakeUntil=performance.now()+360;
  try{ if(navigator.vibrate) navigator.vibrate([35,35,35]); }catch(e){}
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    if(AC){
      const ac=new AC();
      const o=ac.createOscillator();
      const g=ac.createGain();
      o.type='triangle';
      o.frequency.value=160;
      g.gain.value=.045;
      o.connect(g);
      g.connect(ac.destination);
      o.start();
      o.frequency.setValueAtTime(120,ac.currentTime+.07);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.16);
      o.stop(ac.currentTime+.17);
    }
  }catch(e){}
}
function startHoldVisual(){
  holdStart=performance.now();
  holdLabel=uiMode==='effects'?'HOLD RESET':'HOLD CANCEL';
}
function stopHoldVisual(){holdStart=0;holdLabel=''}
function drawHoldProgress(now){
  if(!holdStart)return;
  const p=clamp((now-holdStart)/holdDuration,0,1);
  ctx.save();
  ctx.beginPath();
  ctx.arc(C,C,screenR+22,-Math.PI/2,-Math.PI/2+Math.PI*2*p);
  ctx.strokeStyle=uiMode==='effects'?'rgba(255,90,55,.88)':'rgba(240,210,90,.88)';
  ctx.lineWidth=6;
  ctx.lineCap='round';
  ctx.shadowColor='rgba(0,0,0,.9)';
  ctx.shadowBlur=10;
  ctx.stroke();
  ctx.restore();
  textCenter(holdLabel,C,C-screenR-34,13,'bold',uiMode==='effects'?'#ffb198':'#f7e7a8',.95);
}
function drawFeedback(now){
  if(now<feedbackUntil){
    const a=clamp((feedbackUntil-now)/300,0,1);
    textCenter(feedbackMsg,C,C-screenR-58,18,'bold','#ffd06f',a);
  }
  if(now<resetFlashUntil){
    const a=clamp((resetFlashUntil-now)/500,0,1);
    ctx.save();
    ctx.globalAlpha=a*.35;
    ctx.beginPath();
    ctx.arc(C,C,screenR+10,0,Math.PI*2);
    ctx.strokeStyle='#ff7448';
    ctx.lineWidth=10;
    ctx.stroke();
    ctx.restore();
    textCenter('FACTORY RESET',C,C,24,'bold','#ffd2bd',a);
  }
}
function processImageAt(renderSize, useRGB565){
  const oldP=P, oldRGB=simulateRGB565;
  P=renderSize;
  simulateRGB565=!!useRGB565;
  const img=processImage();
  P=oldP;
  simulateRGB565=oldRGB;
  return img;
}
function fitSourceToSize(size){
  updateLiveSource();
  const c=makeCanvas(size);
  const cx=c.getContext('2d',{willReadFrequently:true});
  const sw=sourceCanvas.width, sh=sourceCanvas.height;
  const side=Math.min(sw,sh), sx=(sw-side)/2, sy=(sh-side)/2;
  cx.imageSmoothingEnabled=true;
  cx.imageSmoothingQuality='high';
  cx.drawImage(sourceCanvas,sx,sy,side,side,0,0,size,size);
  return c;
}
function applyCCDBaseForSize(base,size){
  const oldP=P;
  P=size;
  const out=applyCCDBase(base);
  P=oldP;
  return out;
}
function effectDitherExport(base,e,outSize,logicalGrid){
  const oldP=P;
  const low=makeCanvas(logicalGrid);
  const lx=low.getContext('2d',{willReadFrequently:true});
  lx.imageSmoothingEnabled=true;
  lx.imageSmoothingQuality='high';
  lx.drawImage(base,0,0,logicalGrid,logicalGrid);

  P=logicalGrid;
  const ditherLow=effectDither(low,e);
  P=oldP;

  const out=makeCanvas(outSize);
  const ox=out.getContext('2d');
  ox.imageSmoothingEnabled=false;
  ox.drawImage(ditherLow,0,0,outSize,outSize);
  return out;
}
function effectHalftoneExport(base,e,outSize,logicalGrid){
  const size=paramValue(e,'SIZE'),angleValue=paramValue(e,'ANGLE'),plates=Math.round(paramValue(e,'PALETTE'));
  if(size<=0)return base;

  const scale=outSize/logicalGrid;
  const dotLogical=Math.round(7+size/100*18);
  const dot=dotLogical*scale;
  const angle=(angleValue-50)/50*Math.PI/6;

  const out=makeCanvas(outSize),ox=out.getContext('2d');
  ox.fillStyle='#e8dec8';
  ox.fillRect(0,0,outSize,outSize);

  const sx=base.getContext('2d',{willReadFrequently:true});
  const data=sx.getImageData(0,0,outSize,outSize).data;

  const cols=[[0,0,0],[220,40,40],[40,120,230],[240,190,20],[20,170,110],[190,60,210],[255,120,40],[70,70,70],[30,200,220],[180,120,70]];
  const active=Math.max(1,plates||1),center=logicalGrid/2,ca=Math.cos(angle),sa=Math.sin(angle);

  for(let y=-logicalGrid;y<logicalGrid*2;y+=dotLogical){
    for(let x=-logicalGrid;x<logicalGrid*2;x+=dotLogical){
      const rx=(x-center)*ca-(y-center)*sa+center;
      const ry=(x-center)*sa+(y-center)*ca+center;
      if(rx<0||rx>=logicalGrid||ry<0||ry>=logicalGrid)continue;

      const px=clamp(Math.round(rx*scale),0,outSize-1);
      const py=clamp(Math.round(ry*scale),0,outSize-1);
      const i=(py*outSize+px)*4;
      const r=data[i],g=data[i+1],b=data[i+2];
      const lum=r*.299+g*.587+b*.114;
      const rad=Math.max(.8,(1-lum/255)*dotLogical*.56)*scale;

      let fill='#1a1713';
      if(plates>0){
        const pi=Math.floor(((r+g*2+b*3)/255)*active)%Math.min(active,cols.length);
        const co=cols[pi];
        fill=`rgb(${co[0]},${co[1]},${co[2]})`;
        ox.globalAlpha=.72;
      }

      ox.beginPath();
      ox.arc(rx*scale,ry*scale,rad,0,Math.PI*2);
      ox.fillStyle=fill;
      ox.fill();
      ox.globalAlpha=1;
    }
  }
  return out;
}
function effectCrtRgbExport(base,e,outSize,logicalGrid){
  const split=paramValue(e,'SPLIT'),scan=paramValue(e,'SCAN');
  if(split<=0&&scan<=0)return base;
  const scale=outSize/logicalGrid;
  const h=Math.round(split/100*24*scale);
  const period=Math.max(1,Math.round(4*scale));
  const activeLines=Math.max(1,Math.round(2*scale));

  const c=makeCanvas(outSize),cx=c.getContext('2d',{willReadFrequently:true});
  cx.drawImage(base,0,0);
  const src=cx.getImageData(0,0,outSize,outSize),out=cx.createImageData(outSize,outSize);

  for(let y=0;y<outSize;y++){
    const sm=(y%period<activeLines)?(1-scan/100*.45):1;
    for(let x=0;x<outSize;x++){
      const i=(y*outSize+x)*4;
      const xr=clamp(x+h,0,outSize-1),xb=clamp(x-h,0,outSize-1);
      const ir=(y*outSize+xr)*4,ib=(y*outSize+xb)*4;
      out.data[i]=clamp(src.data[ir]*sm,0,255);
      out.data[i+1]=clamp(src.data[i+1]*sm,0,255);
      out.data[i+2]=clamp(src.data[ib+2]*sm,0,255);
      out.data[i+3]=255;
    }
  }
  cx.putImageData(out,0,0);
  return c;
}
function effectAtSize(base,e,outSize,logicalGrid){
  if(e.name==='DITHER')return effectDitherExport(base,e,outSize,logicalGrid);
  if(e.name==='HALFTONE')return effectHalftoneExport(base,e,outSize,logicalGrid);
  if(e.name==='CRT/RGB')return effectCrtRgbExport(base,e,outSize,logicalGrid);

  const oldP=P;
  P=outSize;
  let out;
  if(e.name==='POSTERIZE')out=effectPosterize(base,e);
  else if(e.name==='NOISE')out=effectNoise(base,e);
  else if(e.name==='INVERT')out=effectInvert(base,e);
  else out=base;
  P=oldP;
  return out;
}
function processImageForExport(exportSize=1000,logicalGrid=P){
  if(liveMode) updateLiveSource();

  let img=applyCCDBaseForSize(fitSourceToSize(exportSize),exportSize);

  for(let i=0;i<stack.length;i++){
    if(draft && typeof draft.editIndex==='number' && draft.editIndex===i) continue;
    img=effectAtSize(img,stack[i],exportSize,logicalGrid);
  }
  if(draft) img=effectAtSize(img,draft,exportSize,logicalGrid);

  return img;
}
function saveHighResolutionCirclePNG(){
  const lockedP=P;
  const exportSize=1000;

  // Full high-res output from the original camera/upload source:
  // preview stays 160/240/320, but save redraws clean geometry/pixel blocks at 1000.
  const img=processImageForExport(exportSize,lockedP);

  const out=makeCanvas(exportSize);
  const ox=out.getContext('2d');
  ox.clearRect(0,0,exportSize,exportSize);
  ox.save();
  ox.beginPath();
  ox.arc(exportSize/2,exportSize/2,exportSize/2,0,Math.PI*2);
  ox.clip();
  ox.imageSmoothingEnabled=true;
  ox.imageSmoothingQuality='high';
  ox.drawImage(img,0,0,exportSize,exportSize);
  ox.restore();

  const a=document.createElement('a');
  a.download=`sira_circle_highres_from_${lockedP}_preview.png`;
  a.href=out.toDataURL('image/png');
  a.click();
  triggerFeedback(`SAVED 1000 PNG`);
}

function createDefaultImage(){
  sourceCanvas.width=900;sourceCanvas.height=900;
  const g=sourceCtx.createLinearGradient(0,0,0,900);
  g.addColorStop(0,'#d9c9a3');g.addColorStop(.45,'#8c8165');g.addColorStop(1,'#28342d');
  sourceCtx.fillStyle=g;sourceCtx.fillRect(0,0,900,900);
  function m(base,color,phase){
    sourceCtx.beginPath();sourceCtx.moveTo(0,900);
    for(let x=0;x<=960;x+=60){let y=base+Math.sin(x*.015+phase)*55+Math.sin(x*.041)*25;sourceCtx.lineTo(x,y)}
    sourceCtx.lineTo(900,900);sourceCtx.closePath();sourceCtx.fillStyle=color;sourceCtx.fill();
  }
  m(440,'#65604e',.2);m(560,'#444b3d',1.5);m(690,'#252d25',2.4);
  sourceCtx.fillStyle='rgba(255,240,180,.8)';sourceCtx.beginPath();sourceCtx.arc(650,250,55,0,Math.PI*2);sourceCtx.fill();
}
function updateLiveSource(){
  if(!liveMode||frozen||video.readyState<2)return;
  sourceCanvas.width=video.videoWidth||900;sourceCanvas.height=video.videoHeight||900;
  sourceCtx.drawImage(video,0,0,sourceCanvas.width,sourceCanvas.height);
}
function fitSourceToP(){
  updateLiveSource();
  const c=makeCanvas(P),cx=c.getContext('2d',{willReadFrequently:true});
  const sw=sourceCanvas.width,sh=sourceCanvas.height,side=Math.min(sw,sh),sx=(sw-side)/2,sy=(sh-side)/2;
  cx.imageSmoothingEnabled=true;cx.imageSmoothingQuality='medium';
  cx.drawImage(sourceCanvas,sx,sy,side,side,0,0,P,P);
  return c;
}
function applyCCDBase(base){
  const c=makeCanvas(P),cx=c.getContext('2d',{willReadFrequently:true});cx.drawImage(base,0,0);
  let id=cx.getImageData(0,0,P,P),d=id.data,seed={value:24681357};
  for(let i=0;i<d.length;i+=4){
    let r=d[i],g=d[i+1],b=d[i+2],lum=r*.299+g*.587+b*.114;
    r=r*1.025+2;g=g*1.005;b=b*.975;
    if(lum>205){let k=(lum-205)/50;r=r*(1-k*.035)+255*(k*.035);g=g*(1-k*.025)+255*(k*.025);b=b*(1-k*.015)+255*(k*.015)}
    let n=(rnd(seed)-.5)*5.5;d[i]=clamp(r+n,0,255);d[i+1]=clamp(g+n,0,255);d[i+2]=clamp(b+n,0,255);
  }
  cx.putImageData(id,0,0);return c;
}
function processImage(){
  const t0=performance.now();
  let img=applyCCDBase(fitSourceToP());

  for(let i=0;i<stack.length;i++){
    if(draft && typeof draft.editIndex==='number' && draft.editIndex===i) continue;
    img=applyEffect(img,stack[i]);
  }
  if(draft) img=applyEffect(img,draft);

  if(simulateRGB565) img=applyRGB565(img);

  lastFrameMS=performance.now()-t0;
  return img;
}
function applyEffect(img,e){
  if(e.name==='DITHER')return effectDither(img,e);
  if(e.name==='HALFTONE')return effectHalftone(img,e);
  if(e.name==='POSTERIZE')return effectPosterize(img,e);
  if(e.name==='CRT/RGB')return effectCrtRgb(img,e);
  if(e.name==='NOISE')return effectNoise(img,e);
  if(e.name==='INVERT')return effectInvert(img,e);
  return img;
}
function effectDither(base,e){
  const amount=paramValue(e,'AMOUNT'),steps=Math.round(paramValue(e,'COLOR')),diff=paramValue(e,'DIFFUSE');
  if(amount<=0)return base;
  const c=makeCanvas(P),cx=c.getContext('2d',{willReadFrequently:true});cx.drawImage(base,0,0);
  let img=cx.getImageData(0,0,P,P),d=img.data,str=amount/100*diff/100;
  if(steps>0){
    const levels=Math.max(2,steps+1);const arr=new Int32Array(d.length);for(let i=0;i<d.length;i++)arr[i]=d[i]<<4;
    for(let y=0;y<P-1;y++)for(let x=1;x<P-1;x++)for(let ch=0;ch<3;ch++){
      const idx=(y*P+x)*4+ch,old=arr[idx],neu=Math.round((old>>4)/255*(levels-1))*(255/(levels-1)),err=(old-(neu<<4))*str;
      arr[idx]=neu<<4;arr[idx+4]+=err*7/16;arr[idx+(P-1)*4]+=err*3/16;arr[idx+P*4]+=err*5/16;arr[idx+(P+1)*4]+=err/16;
    }
    for(let i=0;i<d.length;i+=4){d[i]=clamp(arr[i]>>4,0,255);d[i+1]=clamp(arr[i+1]>>4,0,255);d[i+2]=clamp(arr[i+2]>>4,0,255)}
  }else{
    const gray=new Int32Array(P*P);for(let i=0,j=0;i<d.length;i+=4,j++)gray[j]=(d[i]*77+d[i+1]*150+d[i+2]*29);
    for(let y=0;y<P-1;y++)for(let x=1;x<P-1;x++){
      const idx=y*P+x,old=gray[idx],neu=old>127*256?255*256:0,err=(old-neu)*str;
      gray[idx]=neu;gray[idx+1]+=err*7/16;gray[idx+P-1]+=err*3/16;gray[idx+P]+=err*5/16;gray[idx+P+1]+=err/16;
    }
    for(let i=0,j=0;i<d.length;i+=4,j++){let v=clamp(gray[j]>>8,0,255);d[i]=d[i+1]=d[i+2]=v}
  }
  cx.putImageData(img,0,0);return c;
}
function effectHalftone(base,e){
  const size=paramValue(e,'SIZE'),angleValue=paramValue(e,'ANGLE'),plates=Math.round(paramValue(e,'PALETTE'));
  if(size<=0)return base;

  // Round-dot hardware simulation:
  // sample from the ESP-size buffer, but render dots at 2x then downsample.
  // This keeps the embedded constraint but avoids the square/dither look.
  const dot=Math.round(7+size/100*18);
  const scale=2;
  const HP=P*scale;
  const angle=(angleValue-50)/50*Math.PI/6;
  const high=makeCanvas(HP),hx=high.getContext('2d');
  hx.fillStyle='#e8dec8';
  hx.fillRect(0,0,HP,HP);

  const s=makeCanvas(P),sc=s.getContext('2d',{willReadFrequently:true});
  sc.drawImage(base,0,0,P,P);
  const data=sc.getImageData(0,0,P,P).data;

  const cols=[[0,0,0],[220,40,40],[40,120,230],[240,190,20],[20,170,110],[190,60,210],[255,120,40],[70,70,70],[30,200,220],[180,120,70]];
  const active=Math.max(1,plates||1),center=P/2,ca=Math.cos(angle),sa=Math.sin(angle);

  for(let y=-P;y<P*2;y+=dot){
    for(let x=-P;x<P*2;x+=dot){
      const rx=Math.round((x-center)*ca-(y-center)*sa+center);
      const ry=Math.round((x-center)*sa+(y-center)*ca+center);

function effectPosterize(base,e){
  const lev=paramValue(e,'LEVELS'),pal=paramValue(e,'PALETTE');if(lev<=0&&pal<=0)return base;
  const levels=Math.round(24-lev/100*22),c=makeCanvas(P),cx=c.getContext('2d',{willReadFrequently:true});cx.drawImage(base,0,0);
  const img=cx.getImageData(0,0,P,P),d=img.data;
  for(let i=0;i<d.length;i+=4){

    if(lev>0){r=Math.floor(r/256*levels)*(255/Math.max(1,levels-1));g=Math.floor(g/256*levels)*(255/Math.max(1,levels-1));b=Math.floor(b/256*levels)*(255/Math.max(1,levels-1))}

}
function effectCrtRgb(base,e){
  const split=paramValue(e,'SPLIT'),scan=paramValue(e,'SCAN');if(split<=0&&scan<=0)return base;
  const h=Math.round(split/100*24),c=makeCanvas(P),cx=c.getContext('2d',{willReadFrequently:true});cx.drawImage(base,0,0);

    const i=(y*P+x)*4,xr=clamp(x+h,0,P-1),xb=clamp(x-h,0,P-1),ir=(y*P+xr)*4,ib=(y*P+xb)*4;

function effectNoise(base,e){

  for(let i=0;i<d.length;i+=4){const lg=(rnd(sg)-.5)*grain*1.1;d[i]=clamp(d[i]+lg+(rnd(sn)-.5)*cn*1.2,0,255);d[i+1]=clamp(d[i+1]+lg+(rnd(sn)-.5)*cn*1.2,0,255);d[i+2]=clamp(d[i+2]+lg+(rnd(sn)-.5)*cn*1.2,0,255)}

function effectInvert(base,e){
  const mix=paramValue(e,'MIX');if(mix<=0)return base;

function applyRGB565(base){
  const c=makeCanvas(P),cx=c.getContext('2d',{willReadFrequently:true});cx.drawImage(base,0,0);

function drawOuterBody(){
  const outerBodyR=370;ctx.save();ctx.shadowColor='rgba(0,0,0,.9)';ctx.shadowBlur=60;ctx.shadowOffsetY=12;
  const bg=ctx.createRadialGradient(C-80,C-80,30,C,C,outerBodyR);bg.addColorStop(0,'#e8c86a');bg.addColorStop(.18,'#c8a44a');bg.addColorStop(.45,'#8a6820');bg.addColorStop(.7,'#6b5018');bg.addColorStop(.88,'#9a7830');bg.addColorStop(1,'#b89040');
  ctx.beginPath();ctx.arc(C,C,outerBodyR,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();ctx.restore();
  ctx.beginPath();ctx.arc(C,C,outerBodyR,0,Math.PI*2);ctx.strokeStyle='rgba(255,220,100,.42)';ctx.lineWidth=5;ctx.stroke();
}
function drawRotatingDial(){
  const ringOuter=342,ringInner=262,holeCount=28,holeRadius=9.5,holeOrbit=304;
  const recess=ctx.createRadialGradient(C,C,ringInner,C,C,ringOuter+16);recess.addColorStop(0,'#080705');recess.addColorStop(.58,'#1a1308');recess.addColorStop(1,'#050403');
  ctx.beginPath();ctx.arc(C,C,ringOuter+8,0,Math.PI*2);ctx.arc(C,C,ringInner-9,0,Math.PI*2,true);ctx.fillStyle=recess;ctx.fill('evenodd');

  const rg=dctx.createRadialGradient(C-100,C-120,40,C,C,ringOuter);rg.addColorStop(0,'#ffe39a');rg.addColorStop(.18,'#d9ad54');rg.addColorStop(.43,'#a8752d');rg.addColorStop(.7,'#684017');rg.addColorStop(1,'#c29745');
  dctx.fillStyle=rg;dctx.beginPath();dctx.arc(C,C,ringOuter,0,Math.PI*2);dctx.arc(C,C,ringInner,0,Math.PI*2,true);dctx.fill('evenodd');
  dctx.save();dctx.translate(C,C);dctx.rotate(dialRotation);dctx.translate(-C,-C);
  for(let i=0;i<64;i++){const a=i/64*Math.PI*2,r1=ringInner+18,r2=ringOuter-17;dctx.beginPath();dctx.moveTo(C+Math.cos(a)*r1,C+Math.sin(a)*r1);dctx.lineTo(C+Math.cos(a)*r2,C+Math.sin(a)*r2);dctx.strokeStyle=i%4===0?'rgba(40,22,6,.20)':'rgba(255,225,135,.055)';dctx.lineWidth=i%4===0?1.5:.8;dctx.stroke()}
  dctx.globalCompositeOperation='destination-out';for(let i=0;i<holeCount;i++){const a=i/holeCount*Math.PI*2,x=C+Math.cos(a)*holeOrbit,y=C+Math.sin(a)*holeOrbit;dctx.beginPath();dctx.arc(x,y,holeRadius,0,Math.PI*2);dctx.fill()}
  dctx.globalCompositeOperation='source-over';for(let i=0;i<holeCount;i++){const a=i/holeCount*Math.PI*2,x=C+Math.cos(a)*holeOrbit,y=C+Math.sin(a)*holeOrbit;dctx.beginPath();dctx.arc(x,y,holeRadius+1.8,0,Math.PI*2);dctx.strokeStyle='rgba(255,225,140,.18)';dctx.lineWidth=1.1;dctx.stroke()}
  dctx.restore();dctx.restore();ctx.drawImage(dc,0,0);

function drawScreen(){
  const img=processImage();ctx.save();ctx.beginPath();ctx.arc(C,C,screenR,0,Math.PI*2);ctx.clip();ctx.fillStyle='#000';ctx.fillRect(C-screenR,C-screenR,screenR*2,screenR*2);ctx.imageSmoothingEnabled=false;ctx.drawImage(img,C-screenR,C-screenR,screenR*2,screenR*2);ctx.imageSmoothingEnabled=true;ctx.fillStyle='rgba(0,0,0,.12)';ctx.fillRect(C-screenR,C-screenR,screenR*2,screenR*2);ctx.restore();ctx.beginPath();ctx.arc(C,C,screenR,0,Math.PI*2);ctx.strokeStyle='rgba(255,220,100,.35)';ctx.lineWidth=4;ctx.stroke();
}
function drawTicks(){for(let i=0;i<72;i++){const a=i/72*Math.PI*2-Math.PI/2,isMaj=i%9===0,isMed=i%3===0,inner=screenR-(isMaj?14:isMed?9:5),outer=screenR-1;ctx.beginPath();ctx.moveTo(C+Math.cos(a)*inner,C+Math.sin(a)*inner);ctx.lineTo(C+Math.cos(a)*outer,C+Math.sin(a)*outer);ctx.strokeStyle=isMaj?'rgba(220,180,80,.7)':isMed?'rgba(180,140,60,.4)':'rgba(140,100,40,.2)';ctx.lineWidth=isMaj?1.5:.8;ctx.stroke()}}
function textCenter(t,x,y,s,w='normal',col='#fff3cf',a=1){ctx.save();ctx.globalAlpha=a;ctx.fillStyle=col;ctx.font=`${w} ${s}px Arial,Helvetica,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,.95)';ctx.shadowBlur=12;ctx.shadowOffsetY=2;ctx.fillText(t,x,y);ctx.restore()}
function drawLabels(){
  const proc = cp();
  if(!proc) return;
  const names=uiMode==='effects'?processes.map(p=>p.name):(proc.params||[]).map(p=>p.name),selected=uiMode==='effects'?processIndex:paramIndex,n=names.length||1;

      ctx.fillStyle='#100b05';

  textCenter(`${stackLabel}${editingExisting?' · EDIT':''}`,C,y+28,11,'bold',stack.length>=3?'#ffce70':'rgba(220,180,70,.55)');
}

function drawFrame(){
  if(liveMode&&!frozen)updateLiveSource();
  const now=performance.now();
  dialRotation+=(targetDialRot-dialRotation)*.15;
  ctx.clearRect(0,0,W,H);
  const page=ctx.createRadialGradient(C,C,120,C,C,620);
  page.addColorStop(0,'#101010');page.addColorStop(.66,'#020202');page.addColorStop(1,'#000');
  ctx.fillStyle=page;
  ctx.fillRect(0,0,W,H);

  let shakeX=0;
  if(now<shakeUntil){
    const t=(shakeUntil-now)/360;
    shakeX=Math.sin(now*.12)*12*t;
  }

  ctx.save();
  ctx.translate(shakeX,0);
  drawOuterBody();
  drawRotatingDial();
  drawScreen();
  drawTicks();
  drawLabels();
  drawHoldProgress(now);
  drawFeedback(now);
  ctx.restore();

  if(now-lastFpsUpdate>180){
    document.getElementById('perf').textContent=`ESP ${P}${simulateRGB565?' · RGB565':''} · ${lastFrameMS.toFixed(1)} ms`;
    lastFpsUpdate=now
  }
  requestAnimationFrame(drawFrame);
}
function rotateDial(direction,step=1){
  if(uiMode==='effects'){
    processIndex=(processIndex-direction+processes.length)%processes.length;
    paramIndex=0;
    draft=null;
    targetDialRot-=direction*(Math.PI*2/processes.length);
  }
  else if(uiMode==='params'){
    const ps=cp().params;
    paramIndex=(paramIndex-direction+ps.length)%ps.length;
    targetDialRot-=direction*.18;
  }
  else{
    const p=currentParamFromDraft();
    const st=p.max===10 ? 1 : step;
    p.value=clamp(p.value+direction*st,p.min,p.max);
    targetDialRot+=direction*.055;
  }
  showOverlay();
}
function centerPress(){
  if(uiMode==='effects'){
    draft=getEditableEffect(cp());
    paramIndex=0;
    uiMode='params';
  }
  else if(uiMode==='params'){
    uiMode='value';
  }
  else{
    if(!upsertDraftToStack()) return;
    uiMode='params';
  }
  showOverlay(900);
}
function longPress(){
  if(uiMode==='effects'){
    stack=[];
    draft=null;
    uiMode='effects';
    resetFlashUntil=performance.now()+820;
    try{ if(navigator.vibrate) navigator.vibrate([45,35,45]); }catch(e){}
  }else{
    draft=null;
    uiMode='effects';
    triggerFeedback('CANCELLED');
  }
  stopHoldVisual();
  showOverlay(1100);
}
function resetAll(){
  stack=[];
  draft=null;
  uiMode='effects';
  processIndex=0;
  paramIndex=0;
  grainSeed=12345;
  noiseSeed=67890;
  resetFlashUntil=performance.now()+820;
  showOverlay(1100);
}
function angleFromPoint(clientX,clientY){const r=canvas.getBoundingClientRect();const x=(clientX-r.left)/r.width*W-C,y=(clientY-r.top)/r.height*H-C;return Math.atan2(y,x)}

let touchActive=false,lastAngle=0,accum=0,moved=false;
canvas.addEventListener('pointerdown',e=>{canvas.setPointerCapture(e.pointerId);touchActive=true;moved=false;lastAngle=angleFromPoint(e.clientX,e.clientY);accum=0;startHoldVisual();holdTimer=setTimeout(()=>{suppressClick=true;longPress()},holdDuration)});

document.getElementById('resSel').onchange=e=>{P=Number(e.target.value);showOverlay(900)};
document.getElementById('rgb565Btn').onclick=e=>{simulateRGB565=!simulateRGB565;e.target.textContent=simulateRGB565?'RGB565 ON':'RGB565 OFF';showOverlay(900)};
