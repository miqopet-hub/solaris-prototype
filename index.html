<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SOLARIS CCD Base Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; background:radial-gradient(circle at center,#272016 0%,#100d09 75%); color:#fff3cf; font-family:Arial,Helvetica,sans-serif; display:grid; place-items:center; overflow:hidden; }
  .app { width:min(92vw,760px); height:min(92vw,760px); max-height:92vh; aspect-ratio:1/1; position:relative; user-select:none; }
  canvas { width:100%; height:100%; display:block; border-radius:50%; }
  video { display:none; }
  .toolbar { position:fixed; left:16px; bottom:16px; right:16px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  button,label { background:rgba(255,255,255,.08); color:#fff3cf; border:1px solid rgba(255,255,255,.22); padding:10px 14px; border-radius:999px; cursor:pointer; backdrop-filter:blur(8px); font-size:14px; }
  button:hover,label:hover { background:rgba(255,255,255,.16); }
  input[type=file] { display:none; }
  .hint { position:fixed; top:14px; left:14px; right:14px; text-align:center; color:rgba(255,243,207,.75); font-size:13px; pointer-events:none; }

  @media (max-width: 700px) {
    .hint {
      font-size: 11px;
      top: max(8px, env(safe-area-inset-top));
      padding: 0 14px;
    }
    .app {
      width: min(104vw, 104vh);
      height: min(104vw, 104vh);
      transform: translateY(-18px);
    }
    .toolbar {
      bottom: max(8px, env(safe-area-inset-bottom));
      gap: 6px;
    }
    button, label {
      font-size: 12px;
      padding: 8px 10px;
    }
  }


  html, body, canvas, .app {
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }


  .dialTextLayer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: 50%;
    overflow: visible;
    z-index: 5;
  }
  .dialTextItem {
    position: absolute;
    left: 50%;
    top: 50%;
    transform-origin: center;
    color: #f5ead0;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-align: center;
    white-space: nowrap;
    font-size: 15px;
    opacity: 0;
    filter: blur(1px);
    text-shadow: 0 2px 9px rgba(0,0,0,0.95);
    transition:
      transform 190ms cubic-bezier(.2,.8,.2,1),
      opacity 190ms cubic-bezier(.2,.8,.2,1),
      filter 190ms cubic-bezier(.2,.8,.2,1),
      color 190ms cubic-bezier(.2,.8,.2,1),
      font-size 190ms cubic-bezier(.2,.8,.2,1);
  }
  .dialTextItem.selected {
    color: #f0b64f;
    opacity: 1;
    filter: blur(0px);
    font-size: 22px;
  }
  .dialTextItem.near {
    opacity: 0.5;
    filter: blur(0.7px);
  }
  .dialTextItem.far {
    opacity: 0.22;
    filter: blur(1.7px);
  }

</style>
</head>
<body>
<div class="hint">Drag dial = rotate · Tap = apply/enter · Long press = back/reset · RANDOM = fresh recipe</div>
<main class="app"><canvas id="screen" width="900" height="900"></canvas><div id="dialTextLayer" class="dialTextLayer"></div><video id="video" autoplay playsinline muted></video></main>
<div class="toolbar">
<label>Upload photo<input id="fileInput" type="file" accept="image/*"></label>
<button id="cameraBtn">Start Webcam</button><button id="captureBtn">Freeze Frame</button><button id="modeBtn">Press Center</button><button id="mutateBtn">Mutate</button><button id="backBtn">Back to Effects</button><button id="saveBtn">Save PNG</button><button id="resetBtn">Reset Param</button>
</div>
<script>
const canvas=document.getElementById('screen'),ctx=canvas.getContext('2d',{willReadFrequently:true}),fileInput=document.getElementById('fileInput'),video=document.getElementById('video');

{name:'DITHER',active:false,params:[{name:'AMOUNT',value:50,def:50,min:0,max:100},{name:'COLOR',value:0,def:0,min:0,max:10},{name:'DIFFUSE',value:50,def:50,min:0,max:100}]},
{name:'HALFTONE',active:false,params:[{name:'SIZE',value:50,def:50,min:0,max:100},{name:'PLATES',value:0,def:0,min:0,max:10},{name:'ANGLE',value:50,def:50,min:0,max:100}]},
{name:'POSTERIZE',active:false,params:[{name:'LEVELS',value:50,def:50,min:0,max:100},{name:'PALETTE',value:0,def:0,min:0,max:100},{name:'EDGE',value:0,def:0,min:0,max:100}]},
{name:'RGB',active:false,params:[{name:'H-SPLIT',value:50,def:50,min:0,max:100},{name:'V-SPLIT',value:50,def:50,min:0,max:100}]},
{name:'CRT',active:false,params:[{name:'GLITCH',value:50,def:50,min:0,max:100},{name:'MASK',value:50,def:50,min:0,max:100},{name:'SCAN',value:50,def:50,min:0,max:100},{name:'GLOW',value:50,def:50,min:0,max:100}]},
{name:'TEXTURE',active:false,params:[{name:'GRAIN',value:50,def:50,min:0,max:100},{name:'COLOR NOISE',value:50,def:50,min:0,max:100}]},
{name:'INVERT',active:false,params:[{name:'MIX',value:50,def:50,min:0,max:100},{name:'CURVE',value:50,def:50,min:0,max:100}]}
];
let processIndex=0,paramIndex=0,uiMode=0,lastWheelTime=0,overlayUntil=0,grainSeed=12345,noiseSeed=67890,mutateTimer=null,holdTimer=null,suppressClick=false;
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function cp(){return processes[processIndex]}function cpar(){return cp().params[paramIndex]}function pv(p,n){let pr=processes.find(x=>x.name===p);let pa=pr&&pr.params.find(x=>x.name===n);return pa?pa.value:0}function rnd(s){s.value=(s.value*16807)%2147483647;return(s.value-1)/2147483646}function showOverlay(ms=950){overlayUntil=performance.now()+ms}
function createDefaultImage(){sourceCanvas.width=900;sourceCanvas.height=900;let g=sourceCtx.createLinearGradient(0,0,0,900);g.addColorStop(0,'#d9c9a3');g.addColorStop(.45,'#8c8165');g.addColorStop(1,'#28342d');sourceCtx.fillStyle=g;sourceCtx.fillRect(0,0,900,900);function m(base,color,phase){sourceCtx.beginPath();sourceCtx.moveTo(0,900);for(let x=0;x<=960;x+=60){let y=base+Math.sin(x*.015+phase)*55+Math.sin(x*.041)*25;sourceCtx.lineTo(x,y)}sourceCtx.lineTo(900,900);sourceCtx.closePath();sourceCtx.fillStyle=color;sourceCtx.fill()}m(440,'#65604e',.2);m(560,'#444b3d',1.5);m(690,'#252d25',2.4);sourceCtx.fillStyle='rgba(255,240,180,.8)';sourceCtx.beginPath();sourceCtx.arc(650,250,55,0,Math.PI*2);sourceCtx.fill()}

function fitSource(){updateLiveSource();let t=document.createElement('canvas');t.width=t.height=imageDiameter;let tc=t.getContext('2d',{willReadFrequently:true});let sw=sourceCanvas.width,sh=sourceCanvas.height,side=Math.min(sw,sh),sx=(sw-side)/2,sy=(sh-side)/2;tc.drawImage(sourceCanvas,sx,sy,side,side,0,0,imageDiameter,imageDiameter);return t}
function applyProcess(img,n){if(n==='DITHER')return effectDither(img);if(n==='HALFTONE')return effectHalftone(img);if(n==='POSTERIZE')return effectPosterize(img);if(n==='RGB')return effectRGB(img);if(n==='CRT')return effectCRT(img);if(n==='TEXTURE')return effectTexture(img);if(n==='INVERT')return effectInvert(img);return img}
function applyCCDBase(base){
  const c=document.createElement('canvas');
  c.width=imageDiameter;c.height=imageDiameter;
  const cx=c.getContext('2d',{willReadFrequently:true});
  cx.drawImage(base,0,0);

  let id=cx.getImageData(0,0,imageDiameter,imageDiameter);
  let d=id.data;
  let seed={value:24681357};

  for(let i=0;i<d.length;i+=4){
    let r=d[i],g=d[i+1],b=d[i+2];

    g=g*1.005;

  const ox=out.getContext('2d',{willReadFrequently:true});

  ox.globalAlpha=.28;
  ox.filter='blur(7px)';
  ox.drawImage(bloom,0,0);
  ox.filter='none';
  ox.globalAlpha=1;

  let oid=ox.getImageData(0,0,imageDiameter,imageDiameter);
  let od=oid.data;
  for(let x=0;x<imageDiameter;x++){
    let bright=0;

  return out;
}

function processImage(){let img=applyCCDBase(fitSource()),any=false;for(let i=0;i<processes.length;i++){if(processes[i].random)continue;if(processes[i].random)continue;if(processes[i].active||(i===processIndex&&uiMode>0)){any=true;img=applyProcess(img,processes[i].name)}}return img}

function effectHalftone(base){let size=pv('HALFTONE','SIZE'),plates=Math.round(pv('HALFTONE','PLATES')),angle=(pv('HALFTONE','ANGLE')-50)/50*Math.PI/6;if(size<=0)return applyColorSteps(base,plates);let dot=Math.round(3+size/100*34),out=document.createElement('canvas');out.width=out.height=imageDiameter;let ox=out.getContext('2d');ox.fillStyle='#e8dec8';ox.fillRect(0,0,imageDiameter,imageDiameter);let s=document.createElement('canvas');s.width=s.height=imageDiameter;let sc=s.getContext('2d',{willReadFrequently:true});sc.drawImage(base,0,0);let data=sc.getImageData(0,0,imageDiameter,imageDiameter).data,cols=[[0,0,0],[220,40,40],[40,120,230],[240,190,20],[20,170,110],[190,60,210],[255,120,40],[70,70,70],[30,200,220],[180,120,70]],active=Math.max(1,plates||1);for(let y=-imageDiameter;y<imageDiameter*2;y+=dot)for(let x=-imageDiameter;x<imageDiameter*2;x+=dot){let rx=Math.round((x-C)*Math.cos(angle)-(y-C)*Math.sin(angle)+C),ry=Math.round((x-C)*Math.sin(angle)+(y-C)*Math.cos(angle)+C);if(rx<0||rx>=imageDiameter||ry<0||ry>=imageDiameter)continue;let i=(ry*imageDiameter+rx)*4,r=data[i],g=data[i+1],b=data[i+2],lum=r*.299+g*.587+b*.114,rad=(1-lum/255)*dot*.55,fill='#1a1713';if(plates>0){let pi=Math.floor(((r+g*2+b*3)/255)*active)%Math.min(active,cols.length),co=cols[pi];fill=`rgb(${co[0]},${co[1]},${co[2]})`;ox.globalAlpha=.72}ox.beginPath();ox.arc(rx,ry,rad,0,Math.PI*2);ox.fillStyle=fill;ox.fill();ox.globalAlpha=1}return out}
function effectPosterize(base){let lev=pv('POSTERIZE','LEVELS'),pal=pv('POSTERIZE','PALETTE'),edge=pv('POSTERIZE','EDGE');if(lev<=0&&pal<=0&&edge<=0)return base;let levels=Math.round(24-lev/100*22),c=document.createElement('canvas');c.width=c.height=imageDiameter;let cx=c.getContext('2d',{willReadFrequently:true});cx.drawImage(base,0,0);let img=cx.getImageData(0,0,imageDiameter,imageDiameter),d=img.data,orig=new Uint8ClampedArray(d);for(let i=0;i<d.length;i+=4){let r=d[i],g=d[i+1],b=d[i+2];if(lev>0){r=Math.floor(r/256*levels)*(255/Math.max(1,levels-1));g=Math.floor(g/256*levels)*(255/Math.max(1,levels-1));b=Math.floor(b/256*levels)*(255/Math.max(1,levels-1))}let ps=pal/100,warm=(i/4)%2<1,tr=warm?r*1.18+12:r*.75,tg=warm?g*.92:g*.95+8,tb=warm?b*.72:b*1.2+10;d[i]=clamp(r*(1-ps)+tr*ps,0,255);d[i+1]=clamp(g*(1-ps)+tg*ps,0,255);d[i+2]=clamp(b*(1-ps)+tb*ps,0,255)}if(edge>0){let eh=edge/100;for(let y=1;y<imageDiameter-1;y++)for(let x=1;x<imageDiameter-1;x++){let i=(y*imageDiameter+x)*4,il=(y*imageDiameter+x-1)*4,ir=(y*imageDiameter+x+1)*4,iu=((y-1)*imageDiameter+x)*4,id=((y+1)*imageDiameter+x)*4,e=Math.abs(orig[il]-orig[ir])+Math.abs(orig[iu]-orig[id]);if(e>55){d[i]=d[i]*(1-eh)+orig[i]*eh;d[i+1]=d[i+1]*(1-eh)+orig[i+1]*eh;d[i+2]=d[i+2]*(1-eh)+orig[i+2]*eh}}}cx.putImageData(img,0,0);return c}
function effectRGB(base){let h=Math.round(pv('RGB','H-SPLIT')/100*24),v=Math.round(pv('RGB','V-SPLIT')/100*24);if(h<=0&&v<=0)return base;let c=document.createElement('canvas');c.width=c.height=imageDiameter;let cx=c.getContext('2d',{willReadFrequently:true});cx.drawImage(base,0,0);let src=cx.getImageData(0,0,imageDiameter,imageDiameter),out=cx.createImageData(imageDiameter,imageDiameter);for(let y=0;y<imageDiameter;y++)for(let x=0;x<imageDiameter;x++){let i=(y*imageDiameter+x)*4,xr=clamp(x+h,0,imageDiameter-1),yr=clamp(y+v,0,imageDiameter-1),xb=clamp(x-h,0,imageDiameter-1),yb=clamp(y-v,0,imageDiameter-1),ir=(yr*imageDiameter+xr)*4,ib=(yb*imageDiameter+xb)*4;out.data[i]=src.data[ir];out.data[i+1]=src.data[i+1];out.data[i+2]=src.data[ib+2];out.data[i+3]=255}cx.putImageData(out,0,0);return c}
function effectCRT(base){let glitch=pv('CRT','GLITCH'),mask=pv('CRT','MASK'),scan=pv('CRT','SCAN'),glow=pv('CRT','GLOW');if(glitch<=0&&mask<=0&&scan<=0&&glow<=0)return base;let c=document.createElement('canvas');c.width=c.height=imageDiameter;let cx=c.getContext('2d',{willReadFrequently:true});cx.drawImage(base,0,0);let img=cx.getImageData(0,0,imageDiameter,imageDiameter),d=img.data,src=new Uint8ClampedArray(d),g=glitch/100;for(let y=0;y<imageDiameter;y++){let band=Math.floor(y/9),shift=Math.round(Math.sin(band*2.7)*g*18+(band%11===0?g*34:0)),drop=(band%17===0)?g*.55:0;for(let x=0;x<imageDiameter;x++){let sx=clamp(x+shift,0,imageDiameter-1),i=(y*imageDiameter+x)*4,si=(y*imageDiameter+sx)*4;d[i]=src[si]*(1-drop);d[i+1]=src[si+1]*(1-drop);d[i+2]=src[si+2]*(1-drop)}}for(let y=0;y<imageDiameter;y++){let sm=(y%4<2)?(1-scan/100*.45):1;for(let x=0;x<imageDiameter;x++){let i=(y*imageDiameter+x)*4,phase=x%3,m=mask/100*.28,rm=1,gm=1,bm=1;if(phase===0){rm+=m;gm-=m*.4;bm-=m*.4}if(phase===1){gm+=m;rm-=m*.4;bm-=m*.4}if(phase===2){bm+=m;rm-=m*.4;gm-=m*.4}d[i]=clamp(d[i]*sm*rm,0,255);d[i+1]=clamp(d[i+1]*sm*gm,0,255);d[i+2]=clamp(d[i+2]*sm*bm,0,255)}}cx.putImageData(img,0,0);let out=document.createElement('canvas');out.width=out.height=imageDiameter;let ox=out.getContext('2d');ox.drawImage(c,0,0);let ga=glow/100;ox.globalCompositeOperation='screen';ox.globalAlpha=ga*.8;ox.filter='blur(10px) saturate(1.6) brightness(1.25)';ox.drawImage(c,0,0);ox.globalCompositeOperation='lighter';ox.globalAlpha=ga*.28;ox.filter='blur(24px)';ox.drawImage(c,0,0);ox.filter='none';ox.globalCompositeOperation='source-over';ox.globalAlpha=1;return out}
function effectTexture(base){let grain=pv('TEXTURE','GRAIN'),cn=pv('TEXTURE','COLOR NOISE');if(grain<=0&&cn<=0)return base;let c=document.createElement('canvas');c.width=c.height=imageDiameter;let cx=c.getContext('2d',{willReadFrequently:true});cx.drawImage(base,0,0);let img=cx.getImageData(0,0,imageDiameter,imageDiameter),d=img.data,sg={value:grainSeed},sn={value:noiseSeed};for(let i=0;i<d.length;i+=4){let lg=(rnd(sg)-.5)*grain*1.1;d[i]=clamp(d[i]+lg+(rnd(sn)-.5)*cn*1.2,0,255);d[i+1]=clamp(d[i+1]+lg+(rnd(sn)-.5)*cn*1.2,0,255);d[i+2]=clamp(d[i+2]+lg+(rnd(sn)-.5)*cn*1.2,0,255)}cx.putImageData(img,0,0);return c}
function effectInvert(base){let mix=pv('INVERT','MIX'),curve=pv('INVERT','CURVE');if(mix<=0)return base;let mx=mix/100,gamma=2.5-curve/100*2,c=document.createElement('canvas');c.width=c.height=imageDiameter;let cx=c.getContext('2d',{willReadFrequently:true});cx.drawImage(base,0,0);let img=cx.getImageData(0,0,imageDiameter,imageDiameter),d=img.data;for(let i=0;i<d.length;i+=4){let lum=(d[i]*.299+d[i+1]*.587+d[i+2]*.114)/255,cm=clamp(Math.pow(lum,gamma)*mx*1.5,0,1);d[i]=d[i]*(1-cm)+(255-d[i])*cm;d[i+1]=d[i+1]*(1-cm)+(255-d[i+1])*cm;d[i+2]=d[i+2]*(1-cm)+(255-d[i+2])*cm}cx.putImageData(img,0,0);return c}
function textCenter(t,x,y,s,w='normal',col='#fff3cf',a=1){ctx.save();ctx.globalAlpha=a;ctx.fillStyle=col;ctx.font=`${w} ${s}px Arial,Helvetica,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,.95)';ctx.shadowBlur=12;ctx.shadowOffsetY=2;ctx.fillText(t,x,y);ctx.restore()}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}

let lastDialTextMode = -1;
let lastDialTextNames = "";

function getDialTextNames(){
  if(uiMode===0) return processes.map(p=>p.name);
  return (cp().params || []).map(p=>p.name);
}
function getDialTextSelected(){
  return uiMode===0 ? processIndex : paramIndex;
}
function buildDialTextLayer(){
  const layer = document.getElementById('dialTextLayer');
  if(!layer) return;

  const names = getDialTextNames();
  const key = uiMode + ':' + names.join('|');
  if(key === lastDialTextNames) return;

  lastDialTextNames = key;
  layer.innerHTML = '';

  names.forEach((name, i)=>{
    const el = document.createElement('div');
    el.className = 'dialTextItem';
    el.dataset.index = String(i);
    el.textContent = name;
    layer.appendChild(el);
  });
}
function updateDialTextLayer(){
  const layer = document.getElementById('dialTextLayer');
  if(!layer) return;

  buildDialTextLayer();

  const names = getDialTextNames();
  const selected = getDialTextSelected();
  const n = names.length || 1;
  const items = layer.querySelectorAll('.dialTextItem');

  items.forEach(el=>{
    const i = Number(el.dataset.index);
    let rel = i - selected;
    if(rel > n/2) rel -= n;
    if(rel < -n/2) rel += n;

    const dist = Math.abs(rel);
    const visible = dist <= 4;

    // Position above the image circle, not under the marker.
    // This is HTML overlay, so it animates safely with CSS.
    const angle = (-90 + rel * 30) * Math.PI / 180;
    const radius = 30; // percent of app size
    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius - 3;

    el.classList.remove('selected','near','far');
    if(i === selected) el.classList.add('selected');
    else if(dist <= 2) el.classList.add('near');
    else el.classList.add('far');

    el.style.opacity = visible ? '' : '0';
    el.style.transform =
      `translate(-50%, -50%) translate(${x}vmin, ${y}vmin) rotate(${rel * 3}deg)`;
  });
}

function drawDialLabels(){ updateDialTextLayer(); }
function drawFrame(){if(liveMode&&!frozen)updateLiveSource();ctx.clearRect(0,0,W,H);let bg=ctx.createRadialGradient(C,C,180,C,C,410);bg.addColorStop(0,'#2a2117');bg.addColorStop(.65,'#8b632b');bg.addColorStop(1,'#c2954c');ctx.fillStyle=bg;ctx.beginPath();ctx.arc(C,C,375,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#e0be73';ctx.lineWidth=3;ctx.stroke();for(let i=0;i<72;i++){let a=(i*5-90)*Math.PI/180,long=i%6===0,r1=long?284:298,r2=327;ctx.strokeStyle=long?'#2a1d10':'#4a351c';ctx.lineWidth=long?4:1.5;ctx.beginPath();ctx.moveTo(C+Math.cos(a)*r1,C+Math.sin(a)*r1);ctx.lineTo(C+Math.cos(a)*r2,C+Math.sin(a)*r2);ctx.stroke()}drawDialLabels();let img=processImage();ctx.save();ctx.beginPath();ctx.arc(C,C,imageDiameter/2,0,Math.PI*2);ctx.clip();ctx.drawImage(img,C-imageDiameter/2,C-imageDiameter/2);let edge=ctx.createRadialGradient(C,C,imageDiameter*.35,C,C,imageDiameter*.52);edge.addColorStop(0,'rgba(0,0,0,0)');edge.addColorStop(1,'rgba(0,0,0,.13)');ctx.fillStyle=edge;ctx.fillRect(C-imageDiameter/2,C-imageDiameter/2,imageDiameter,imageDiameter);ctx.restore();ctx.strokeStyle='rgba(255,236,185,.48)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(C,C,imageDiameter/2,0,Math.PI*2);ctx.stroke();let now=performance.now();if(now<overlayUntil){let a=clamp((overlayUntil-now)/350,0,1),proc=cp(),par=cpar();ctx.save();ctx.globalAlpha=a;rr(C-115,C+imageDiameter/2-110,230,84,24);ctx.fillStyle='rgba(12,10,7,.58)';ctx.fill();ctx.restore();let top='PROCESS',main=proc.name,sub='';if(uiMode===1){top='PARAMETER';main=par.name;sub=proc.name}if(uiMode===2){top=par.name;main=String(Math.round(par.value));sub=proc.name}textCenter(top,C,C+imageDiameter/2-92,13,'normal','#f7e8ba',a);textCenter(main,C,C+imageDiameter/2-64,26,'bold','#fff6d7',a);if(sub)textCenter(sub,C,C+imageDiameter/2-38,13,'normal','#f7e8ba',a)}ctx.save();ctx.fillStyle='#b98c43';ctx.strokeStyle='#efcd86';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(C,42);ctx.lineTo(C-36,138);ctx.lineTo(C+36,138);ctx.closePath();ctx.fill();ctx.stroke();textCenter('A',C,105,38,'bold','#19120c');ctx.restore();if(liveMode&&!frozen)requestAnimationFrame(drawFrame);else if(now<overlayUntil)requestAnimationFrame(drawFrame)}
function rotateDial(direction,step){if(uiMode===0){processIndex=(processIndex-direction+processes.length)%processes.length;paramIndex=0}else if(uiMode===1){let ps=cp().params;paramIndex=(paramIndex-direction+ps.length)%ps.length}else{cp().active=true;let par=cpar(),st=par.max===10?1:step;par.value=clamp(par.value+direction*st,par.min,par.max)}showOverlay();updateDialTextLayer();drawFrame()}
function centerPress(){
  if(uiMode===0){
    if(cp().random){
      mutateRecipe();
      return;
    }
    uiMode=1;
    paramIndex=0;
  }else if(uiMode===1){
    cp().active=true;
    uiMode=2;
  }else{
    cp().active=true;
    uiMode=1;
  }
  showOverlay(1100);
  updateDialTextLayer();
  drawFrame();
}
function backToEffects(){
  uiMode=0;
  updateDialTextLayer();
  showOverlay(900);
  drawFrame();
}
function resetCurrentParameter(){
  if(uiMode===2){
    let par=cpar();
    par.value=par.def;
    showOverlay(1000);
    drawFrame();
  }else if(uiMode===1){
    backToEffects();
  }else{
    resetAllParameters();
  }
}
function resetAllParameters(){
  processes.forEach(p=>{
    p.active=false;
    if(p.params)p.params.forEach(par=>par.value=par.def);
  });
  grainSeed=12345;
  noiseSeed=67890;
  uiMode=0;
  updateDialTextLayer();
  showOverlay(1200);
  drawFrame();
}
function mutateRecipe(){
  // Fresh procedural recipe each click.
  processes.forEach(p=>{
    p.active=false;
    if(p.params)p.params.forEach(par=>par.value=par.def);
  });

  let real=processes.filter(p=>!p.random);
  let changes=2+Math.floor(Math.random()*4);

  for(let c=0;c<changes;c++){
    let p=real[Math.floor(Math.random()*real.length)];
    p.active=true;
    let edits=1+(Math.random()<.35?1:0);

    for(let e=0;e<edits;e++){
      let par=p.params[Math.floor(Math.random()*p.params.length)];
      let range=par.max-par.min;
      if(range<=10){
        par.value=Math.floor(Math.random()*(par.max-par.min+1))+par.min;
      }else{
        let v=35+Math.random()*55;
        if(Math.random()<.18)v=Math.random()*100;
        par.value=clamp(Math.round(v/5)*5,par.min,par.max);
      }
    }
  }

  grainSeed=Math.floor(Math.random()*2000000000)+1;
  noiseSeed=Math.floor(Math.random()*2000000000)+1;
  uiMode=0;
  updateDialTextLayer();
  showOverlay(1100);
  drawFrame();
}
function startMutation(){if(mutateTimer)return;mutateRecipe();mutateTimer=setInterval(mutateRecipe,170)}function stopMutation(){if(holdTimer){clearTimeout(holdTimer);holdTimer=null}if(mutateTimer){clearInterval(mutateTimer);mutateTimer=null}}

let touchDialActive=false;
let touchLastAngle=0;
let touchAccum=0;
let touchMoved=false;

function angleFromPoint(clientX, clientY){
  let r=canvas.getBoundingClientRect();
  let x=(clientX-r.left)/r.width*W-C;
  let y=(clientY-r.top)/r.height*H-C;
  return Math.atan2(y,x);
}
function signedAngleDelta(a,b){
  let d=a-b;
  while(d>Math.PI)d-=Math.PI*2;
  while(d<-Math.PI)d+=Math.PI*2;
  return d;
}
function isInsideCanvasCircle(clientX, clientY){
  let r=canvas.getBoundingClientRect();
  let x=(clientX-r.left)/r.width*W;
  let y=(clientY-r.top)/r.height*H;
  return Math.hypot(x-C,y-C)<imageDiameter/2;
}

// Touch/drag dial for phone.
// Drag around the circle clockwise/counterclockwise.
// Small angular movement = 1 step, fast/bigger movement = repeated steps.
canvas.addEventListener('pointerdown',e=>{
  if(e.pointerType==='mouse')return;
  canvas.setPointerCapture(e.pointerId);
  touchDialActive=true;
  touchMoved=false;
  touchLastAngle=angleFromPoint(e.clientX,e.clientY);
  touchAccum=0;

  let r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*W,y=(e.clientY-r.top)/r.height*H;
  if(Math.hypot(x-C,y-C)<imageDiameter/2){
    holdTimer=setTimeout(()=>{suppressClick=true;resetCurrentParameter()},520);
  }
});

canvas.addEventListener('pointermove',e=>{
  if(!touchDialActive || e.pointerType==='mouse')return;
  e.preventDefault();

  let a=angleFromPoint(e.clientX,e.clientY);
  let d=signedAngleDelta(a,touchLastAngle);
  touchLastAngle=a;
  touchAccum+=d;

  let browseMode = uiMode===0 || uiMode===1;
  let threshold = browseMode ? 0.145 : 0.055;
  let fastThreshold = browseMode ? 0.34 : 0.14;

  if(Math.abs(touchAccum)>threshold){
    touchMoved=true;
    if(holdTimer){clearTimeout(holdTimer);holdTimer=null}
    let dir=touchAccum>0?-1:1;
    let step=Math.abs(touchAccum)>fastThreshold?5:1;
    rotateDial(dir,step);
    touchAccum=0;
  }
},{passive:false});

canvas.addEventListener('pointerup',e=>{
  if(e.pointerType==='mouse')return;
  touchDialActive=false;
  if(holdTimer){clearTimeout(holdTimer);holdTimer=null}
  stopMutation();
  if(touchMoved){
    suppressClick=true;
    setTimeout(()=>suppressClick=false,80);
  }
});

canvas.addEventListener('pointercancel',e=>{
  touchDialActive=false;
  if(holdTimer){clearTimeout(holdTimer);holdTimer=null}
  stopMutation();
});

canvas.addEventListener('wheel',e=>{e.preventDefault();let now=performance.now(),dt=now-lastWheelTime;lastWheelTime=now;let dir=e.deltaY<0?1:-1,step=(dt<70||Math.abs(e.deltaY)>90)?5:1;rotateDial(dir,step)},{passive:false});canvas.addEventListener('mousedown',e=>{
  let r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*W,y=(e.clientY-r.top)/r.height*H;
  if(Math.hypot(x-C,y-C)<imageDiameter/2){
    holdTimer=setTimeout(()=>{suppressClick=true;resetCurrentParameter()},520);
  }
});
window.addEventListener('mouseup',()=>{stopMutation()});canvas.addEventListener('click',e=>{if(suppressClick){suppressClick=false;return}let r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*W,y=(e.clientY-r.top)/r.height*H;if(Math.hypot(x-C,y-C)<imageDiameter/2)centerPress()});document.getElementById('modeBtn').onclick=centerPress;document.getElementById('mutateBtn').onclick=mutateRecipe;document.getElementById('backBtn').onclick=backToEffects;document.getElementById('resetBtn').onclick=()=>{let p=cpar();p.value=p.def;showOverlay(1000);drawFrame()};document.getElementById('saveBtn').onclick=()=>{let im=processImage(),out=document.createElement('canvas');out.width=out.height=imageDiameter;let ox=out.getContext('2d');ox.save();ox.beginPath();ox.arc(imageDiameter/2,imageDiameter/2,imageDiameter/2,0,Math.PI*2);ox.clip();ox.drawImage(im,0,0);ox.restore();let link=document.createElement('a');link.download=`solaris_${cp().name.toLowerCase()}.png`;link.href=out.toDataURL('image/png');link.click()};document.getElementById('captureBtn').onclick=()=>{if(liveMode){updateLiveSource();frozen=!frozen;document.getElementById('captureBtn').textContent=frozen?'Resume Live':'Freeze Frame';showOverlay(900);drawFrame()}};document.getElementById('cameraBtn').onclick=async()=>{try{if(!liveMode){liveStream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},facingMode:'environment'},audio:false});video.srcObject=liveStream;liveMode=true;frozen=false;document.getElementById('cameraBtn').textContent='Stop Webcam';document.getElementById('captureBtn').textContent='Freeze Frame';showOverlay(1100);drawFrame()}else{liveStream?.getTracks().forEach(t=>t.stop());liveStream=null;liveMode=false;frozen=false;document.getElementById('cameraBtn').textContent='Start Webcam';document.getElementById('captureBtn').textContent='Freeze Frame';showOverlay(900);drawFrame()}}catch(err){alert('Camera access failed. Try Chrome/Firefox, or run from localhost if your browser blocks webcam access on local files.')}};fileInput.addEventListener('change',()=>{let file=fileInput.files[0];if(!file)return;if(liveMode){liveStream?.getTracks().forEach(t=>t.stop());liveStream=null;liveMode=false;frozen=false;document.getElementById('cameraBtn').textContent='Start Webcam';document.getElementById('captureBtn').textContent='Freeze Frame'}let img=new Image();img.onload=()=>{sourceCanvas.width=img.width;sourceCanvas.height=img.height;sourceCtx.drawImage(img,0,0);showOverlay(900);drawFrame()};img.src=URL.createObjectURL(file)});document.addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();centerPress()}if(e.key==='Escape'||e.key==='Backspace'){e.preventDefault();backToEffects()}if(e.key.toLowerCase()==='o')fileInput.click();if(e.key.toLowerCase()==='r'){resetCurrentParameter()}if(e.key.toLowerCase()==='s')document.getElementById('saveBtn').click();if(e.key.toLowerCase()==='m')mutateRecipe()});createDefaultImage();
updateDialTextLayer();showOverlay(900);drawFrame();
</script>
