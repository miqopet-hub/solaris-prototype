<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#050607">
<title>FK17 OKO</title>
<style>
:root{
  --bg:#050607;
  --panel:#111318;
  --panel2:#191c22;
  --line:rgba(255,255,255,.10);
  --line2:rgba(255,255,255,.06);
  --text:#f6f7f8;
  --muted:rgba(255,255,255,.48);
  --accent:#fff;
  --danger:#ff6258;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif}
body{overscroll-behavior:none}
button,input,label{font:inherit}
button,label{-webkit-tap-highlight-color:transparent}
button{color:inherit}
.app{
  width:min(100%,480px);
  min-height:100dvh;
  margin:auto;
  padding:max(10px,env(safe-area-inset-top)) 14px max(18px,env(safe-area-inset-bottom));
  display:flex;
  flex-direction:column;
  gap:12px;
}
.header{
  height:68px;
  display:grid;
  grid-template-columns:48px 1fr 48px;
  align-items:center;
}
.iconButton{
  width:44px;height:44px;border-radius:50%;
  background:#111318;border:1px solid var(--line);color:#fff;
  display:grid;place-items:center;font-size:20px;
}
.brand{text-align:center;line-height:1}
.brand small{display:block;color:var(--muted);font-size:12px;font-weight:650;margin-bottom:5px}
.brand strong{font-size:27px;font-weight:400;letter-spacing:.20em;padding-left:.20em}

.dialStage{
  position:relative;
  width:100%;
  aspect-ratio:1;
  display:grid;
  place-items:center;
  touch-action:none;
  cursor:grab;
  user-select:none;
  -webkit-user-select:none;
}
.dialShell{
  position:absolute;
  inset:1%;
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 45%, #171a21 0 68%, #101319 69% 83%, #151820 84% 100%);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:
    inset 0 0 0 9px rgba(255,255,255,.015),
    inset 0 0 35px rgba(0,0,0,.85),
    0 0 0 1px rgba(255,255,255,.04);
  z-index:1;
}
.tickRing{
  position:absolute;
  inset:1%;
  border-radius:50%;
  z-index:4;
  pointer-events:none;
  will-change:transform;
  transition:none;
  filter:drop-shadow(0 0 1px rgba(255,255,255,.15));
}
.tickRing svg{
  width:100%;
  height:100%;
  display:block;
  overflow:visible;
}
.tickRing .minorTicks{
  stroke:rgba(255,255,255,.30);
  stroke-width:.22;
}
.tickRing .majorTicks{
  stroke:rgba(255,255,255,.82);
  stroke-width:.55;
}
.tickRing .midTicks{
  stroke:rgba(255,255,255,.52);
  stroke-width:.38;
}
.tickRing .outerGuide{
  fill:none;
  stroke:rgba(255,255,255,.08);
  stroke-width:.7;
}
.tickRing .innerGuide{
  fill:none;
  stroke:rgba(255,255,255,.08);
  stroke-width:.7;
}
.indexMarker{
  position:absolute;
  top:1.5%;
  left:50%;
  transform:translate(-50%,0);
  width:0;
  height:0;
  border-left:6px solid transparent;
  border-right:6px solid transparent;
  border-bottom:11px solid #f0f0f0;
  z-index:7;
  filter:drop-shadow(0 1px 2px #000);
}
.previewWrap{
  position:absolute;
  inset:11.4%;
  z-index:2;
  border-radius:50%;
  overflow:hidden;
  background:#000;
  border:1px solid rgba(255,255,255,.14);
  box-shadow:
    0 0 0 3px rgba(0,0,0,.65),
    inset 0 0 42px rgba(0,0,0,.66);
}
#preview{width:100%;height:100%;display:block;background:#000}
.effectPill{
  margin:-10px auto 0;
  width:min(270px,74%);
  height:50px;border:1px solid var(--line);border-radius:999px;
  background:rgba(15,17,21,.97);
  display:grid;grid-template-columns:42px 1fr 42px;align-items:center;
  position:relative;z-index:5;
}
.effectPill button{height:100%;border:0;background:transparent;font-size:28px}
.effectCenter{text-align:center}
.effectName{font-size:14px;font-weight:650;letter-spacing:.06em}
.effectDots{font-size:13px;letter-spacing:4px;color:rgba(255,255,255,.23);white-space:nowrap}
.effectDots .active{color:#fff}

.panel{border:1px solid var(--line);border-radius:20px;background:linear-gradient(180deg,#15171c,#0f1115);overflow:hidden}
.paramRow{
  min-height:74px;padding:12px 14px;
  display:grid;grid-template-columns:102px 40px 1fr 40px 34px;gap:8px;align-items:center;
  border-bottom:1px solid var(--line2)
}
.paramRow:last-child{border-bottom:0}
.paramText strong{display:block;font-size:15px;font-weight:550}
.paramText small{display:block;color:var(--muted);font-size:11px;margin-top:4px}
.step{width:38px;height:38px;border:0;border-radius:50%;background:#24272d;font-size:23px}
.range{width:100%;accent-color:#fff}
.value{text-align:center;font-size:18px}


.stackHeader{display:flex;justify-content:space-between;align-items:center;padding:2px 4px;font-size:13px}
.stackHeader span:last-child{color:var(--muted)}
.stack{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.stack::-webkit-scrollbar{display:none}
.card{
  min-width:132px;height:72px;border:1px solid var(--line);border-radius:14px;background:#121419;
  padding:10px 11px;color:rgba(255,255,255,.64);font-size:11px;text-align:left
}
.card strong{display:block;color:#fff;font-size:13px;font-weight:550;margin-bottom:8px}
.card.add{min-width:72px;display:grid;place-items:center;font-size:28px;border-style:dashed;color:rgba(255,255,255,.65)}

.cameraBar,.utilityBar{display:grid;gap:8px;border:1px solid var(--line);border-radius:20px;background:#0f1114;padding:8px}
.cameraBar{grid-template-columns:1fr 1fr 1.1fr 1fr}
.utilityBar{grid-template-columns:1fr 1fr 1fr}
.cameraBar button,.cameraBar label,.utilityBar button,.utilityBar label{
  min-height:64px;border:0;border-radius:15px;background:#191c21;color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-size:12px
}
.utilityBar button,.utilityBar label{min-height:56px}
.shutter{
  width:64px!important;height:64px!important;min-height:64px!important;border-radius:50%!important;
  background:#f5f5f5!important;border:6px solid #181a1f!important;box-shadow:0 0 0 4px #d4d4d4!important;margin:auto
}
#recordButton{color:var(--danger)}
input[type=file]{display:none}
.status{min-height:20px;text-align:center;color:var(--muted);font-size:12px}
@media(max-width:390px){
  .app{padding-left:10px;padding-right:10px;gap:10px}
  .paramRow{grid-template-columns:88px 36px 1fr 36px 30px;padding:10px}
  .step{width:34px;height:34px}
  .cameraBar button,.cameraBar label{font-size:11px}
}

.card{position:relative}
.cardDelete{
  position:absolute;
  top:6px;
  right:7px;
  width:24px;
  height:24px;
  border:0;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.75);
  font-size:16px;
  line-height:1;
}
.cardDelete:active{background:rgba(255,90,80,.28)}
.holdRing{
  position:absolute;
  inset:0;
  border-radius:50%;
  pointer-events:none;
  box-shadow:inset 0 0 0 0 rgba(255,255,255,.9);
  transition:box-shadow .12s linear;
}
.holdRing.active{
  box-shadow:inset 0 0 0 5px rgba(255,255,255,.85);
}


.randomStandalone{
  width:100%;
  min-height:54px;
  border:1px solid var(--line);
  border-radius:18px;
  background:#111318;
  color:#fff;
  font-size:14px;
}
.screenAction{
  position:absolute;
  z-index:10;
  bottom:1.7%;
  width:54px;
  height:54px;
  border-radius:50%;
  touch-action:none;
}
.resetAction{
  left:10%;
  border:1px solid rgba(255,255,255,.18);
  background:#171a1f;
  color:#fff;
  font-size:23px;
  box-shadow:0 3px 12px rgba(0,0,0,.45);
}
.shutterAction{
  right:10%;
  background:#f3f3f3;
  border:6px solid #181a1f;
  box-shadow:0 0 0 3px #cfcfcf,0 3px 12px rgba(0,0,0,.45);
}
.effectDelete{
  position:absolute;
  top:7px;
  right:7px;
  width:26px;
  height:26px;
  border:0;
  border-radius:50%;
  background:rgba(255,255,255,.10);
  color:#fff;
  font-size:17px;
  display:grid;
  place-items:center;
}
.effectDelete:active{background:rgba(255,95,85,.34)}
.cardContent{
  width:100%;
  height:100%;
  border:0;
  background:transparent;
  color:inherit;
  padding:0;
  text-align:left;
}

</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div aria-hidden="true"></div>
    <div class="brand"><small>FK17</small><strong>OKO</strong></div>
    <div aria-hidden="true"></div>
  </header>

  <section class="dialStage" id="dialStage">
    <div class="dialShell"></div>
    <div class="tickRing" id="tickRing"></div>
    <div class="indexMarker"></div>
    <div class="holdRing" id="holdRing"></div>
    <div class="previewWrap"><canvas id="preview"></canvas></div>
    <button class="screenAction resetAction" id="resetButton" type="button" aria-label="Reset">↺</button>
    <button class="screenAction shutterAction" id="shutterButton" type="button" aria-label="Photo. Hold for video"></button>
  </section>

  <section class="effectPill">
    <button id="prevEffect" aria-label="Previous effect">‹</button>
    <div class="effectCenter">
      <div class="effectName" id="effectName">DITHER</div>
      <div class="effectDots" id="effectDots"></div>
    </div>
    <button id="nextEffect" aria-label="Next effect">›</button>
  </section>

  <section class="panel" id="paramsPanel"></section>
  <button class="randomStandalone" id="randomButton" type="button">Random</button>
<div class="stackHeader"><span>STACK <b id="stackCount">(0/3)</b></span><span>Tap to edit</span></div>
  <section class="stack" id="stack"></section>
<section class="cameraBar" style="grid-template-columns:1fr 1fr">
    <button id="cameraButton">↺<span>Swap Camera</span></button>
    <button id="saveButton">⇩<span>Save</span></button>
  </section>

  <section class="utilityBar" style="grid-template-columns:1fr">
    <label id="uploadLabel">▧<span>Upload</span><input id="fileInput" type="file" accept="image/*"></label>
  </section>

  <div class="status" id="status"></div>
  <video id="video" playsinline muted autoplay hidden></video>
</div>

<script>
'use strict';

const EFFECTS = [
  {name:'DITHER', params:[
    {name:'Size',min:1,max:20,value:5,step:1},
    {name:'Threshold',min:0,max:100,value:52,step:1},
    {name:'Detail',min:0,max:100,value:68,step:1}
  ]},
  {name:'HALFTONE', params:[
    {name:'Size',min:1,max:20,value:7,step:1},
    {name:'Angle',min:0,max:100,value:50,step:1},
    {name:'Color',min:0,max:1,value:0,step:1}
  ]},
  {name:'POSTERIZE', params:[
    {name:'Levels',min:2,max:12,value:5,step:1},
    {name:'Mix',min:0,max:100,value:100,step:1}
  ]},
  {name:'RGB', params:[
    {name:'Split',min:0,max:30,value:8,step:1},
    {name:'Scan',min:0,max:100,value:25,step:1}
  ]},
  {name:'NOISE', params:[
    {name:'Amount',min:0,max:100,value:25,step:1},
    {name:'Mono',min:0,max:1,value:1,step:1}
  ]},
  {name:'INVERT', params:[
    {name:'Mix',min:0,max:100,value:100,step:1}
  ]}
];

const preview = document.getElementById('preview');
const pctx = preview.getContext('2d',{willReadFrequently:true});
const video = document.getElementById('video');
const fileInput = document.getElementById('fileInput');
const statusEl = document.getElementById('status');
const tickRing = document.getElementById('tickRing');
const dialStage = document.getElementById('dialStage');

let source = document.createElement('canvas');
let sctx = source.getContext('2d',{willReadFrequently:true});
let stream = null;
let facingMode = 'environment';
let frozen = false;
let selected = 0;
let stack = [];
let dialDegrees = 0;
let dragging = false;
let lastAngle = 0;
let accumulated = 0;
let recorder = null;
let chunks = [];
let recording = false;
let renderPending = false;
let dialHoldTimer = null;
let dialHoldTriggered = false;
let dialPointerMoved = false;
let shutterHoldTimer = null;
let shutterHoldTriggered = false;
let shutterPointerDown = false;

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const copyEffect=(e)=>({name:e.name,params:e.params.map(p=>({...p}))});
const current=()=>EFFECTS[selected];

function setStatus(message,ms=1500){
  statusEl.textContent=message;
  clearTimeout(setStatus.timer);
  setStatus.timer=setTimeout(()=>{statusEl.textContent=''},ms);
}

function buildTicks(){
  const lines=[];
  for(let i=0;i<60;i++){
    const angle=(i*6-90)*Math.PI/180;
    const major=i%5===0;
    const mid=!major && i%2===0;
    const r1=major?40.8:(mid?41.9:42.8);
    const r2=major?46.2:(mid?45.8:45.2);
    const x1=50+Math.cos(angle)*r1;
    const y1=50+Math.sin(angle)*r1;
    const x2=50+Math.cos(angle)*r2;
    const y2=50+Math.sin(angle)*r2;
    const cls=major?'majorTicks':(mid?'midTicks':'minorTicks');
    lines.push(`<line class="${cls}" x1="${x1.toFixed(3)}" y1="${y1.toFixed(3)}" x2="${x2.toFixed(3)}" y2="${y2.toFixed(3)}" />`);
  }

  tickRing.innerHTML=`
    <svg viewBox="0 0 100 100" aria-hidden="true" focusable="false">
      <circle class="outerGuide" cx="50" cy="50" r="48.2"></circle>
      <circle class="innerGuide" cx="50" cy="50" r="37.8"></circle>
      ${lines.join('')}
    </svg>`;
  tickRing.style.transform=`rotate(${dialDegrees}deg)`;
}

function makeDefault(){
  source.width=720;source.height=720;
  const g=sctx.createLinearGradient(0,0,720,720);
  g.addColorStop(0,'#0f1510');g.addColorStop(.45,'#879c60');g.addColorStop(1,'#121412');
  sctx.fillStyle=g;sctx.fillRect(0,0,720,720);
  sctx.fillStyle='rgba(255,255,255,.12)';
  for(let i=0;i<18;i++){
    sctx.beginPath();
    sctx.arc(360+Math.cos(i*.9)*220,360+Math.sin(i*1.4)*220,30+(i%5)*12,0,Math.PI*2);
    sctx.fill();
  }
}

function resizePreview(){
  const rect=preview.getBoundingClientRect();
  const dpr=Math.min(3,window.devicePixelRatio||1);
  const size=Math.max(1,Math.round(rect.width*dpr));
  if(preview.width!==size||preview.height!==size){
    preview.width=size;preview.height=size;
  }
  requestRender();
}

function sourceSquare(size){
  updateVideoSource();
  const c=document.createElement('canvas');
  c.width=c.height=size;
  const cx=c.getContext('2d',{willReadFrequently:true});
  const sw=source.width,sh=source.height,side=Math.min(sw,sh);
  cx.drawImage(source,(sw-side)/2,(sh-side)/2,side,side,0,0,size,size);
  return c;
}

function updateVideoSource(){
  if(!stream||frozen||video.readyState<2)return;
  const w=video.videoWidth,h=video.videoHeight;
  if(!w||!h)return;
  source.width=w;source.height=h;
  sctx.save();
  if(facingMode==='user'){
    sctx.translate(w,0);sctx.scale(-1,1);
  }
  sctx.drawImage(video,0,0,w,h);
  sctx.restore();
}

function getParam(effect,name){
  return effect.params.find(p=>p.name===name)?.value ?? 0;
}

function ditherEffect(input,e){
  const size=getParam(e,'Size');
  const threshold=getParam(e,'Threshold');
  const detail=getParam(e,'Detail');
  const w=input.width,h=input.height;
  const srcCtx=input.getContext('2d',{willReadFrequently:true});
  const img=srcCtx.getImageData(0,0,w,h);
  const d=img.data;
  const lum=new Float32Array(w*h);
  for(let i=0,j=0;i<d.length;i+=4,j++)lum[j]=d[i]*.299+d[i+1]*.587+d[i+2]*.114;

  const out=document.createElement('canvas');out.width=w;out.height=h;
  const ox=out.getContext('2d');ox.fillStyle='#020302';ox.fillRect(0,0,w,h);
  ox.fillStyle='#c9d6ad';

  const cell=1.2+size*.18;
  const bayer=[[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
  const cols=Math.ceil(w/cell),rows=Math.ceil(h/cell);
  for(let gy=0;gy<rows;gy++){
    for(let gx=0;gx<cols;gx++){
      const x=Math.min(w-1,Math.floor((gx+.5)*cell));
      const y=Math.min(h-1,Math.floor((gy+.5)*cell));
      const idx=y*w+x;
      let v=lum[idx];
      if(detail>0){
        const x0=Math.max(0,x-1),x1=Math.min(w-1,x+1),y0=Math.max(0,y-1),y1=Math.min(h-1,y+1);
        let a=0,n=0;
        for(let yy=y0;yy<=y1;yy++)for(let xx=x0;xx<=x1;xx++){a+=lum[yy*w+xx];n++}
        v+=(v-a/n)*(detail/100)*1.7;
      }
      v=(v-(threshold-50)*2.0-128)*(1+detail/100*.65)+128;
      const t=(bayer[gy&3][gx&3]+.5)/16;
      const q=clamp(v/255,0,1);
      if(q<=t)continue;

      const cx=(gx+.5)*cell,cy=(gy+.5)*cell;
      const phase=(gx+gy*3)&3;
      const arm=Math.max(.38,cell*.28);
      const thick=Math.max(.28,cell*.075);
      if(q<.34){
        ox.beginPath();ox.arc(cx,cy,Math.max(.25,cell*.065),0,Math.PI*2);ox.fill();
      }else if(q<.70){
        ox.save();ox.translate(cx,cy);ox.rotate(phase%2?Math.PI/4:0);
        ox.fillRect(-arm,-thick/2,arm*2,thick);
        ox.fillRect(-thick/2,-arm,thick,arm*2);
        ox.restore();
      }else{
        const s=Math.max(.8,cell*.48);
        ox.fillRect(cx-s/2,cy-s/2,s,s);
      }
    }
  }
  return out;
}

function halftoneEffect(input,e){
  const size=getParam(e,'Size');
  const angle=(getParam(e,'Angle')-50)/50*Math.PI/4;
  const color=getParam(e,'Color')>0;
  const w=input.width;
  const sx=input.getContext('2d',{willReadFrequently:true});
  const d=sx.getImageData(0,0,w,w).data;
  const out=document.createElement('canvas');out.width=out.height=w;
  const ox=out.getContext('2d');ox.fillStyle='#eee7d8';ox.fillRect(0,0,w,w);
  const cell=2+size*.65,ca=Math.cos(angle),sa=Math.sin(angle),c=w/2;
  for(let yy=-w;yy<w*2;yy+=cell*.87){
    for(let xx=-w;xx<w*2;xx+=cell){
      const rx=(xx-c)*ca-(yy-c)*sa+c,ry=(xx-c)*sa+(yy-c)*ca+c;
      if(rx<0||ry<0||rx>=w||ry>=w)continue;
      const i=(Math.floor(ry)*w+Math.floor(rx))*4;
      const lum=(d[i]*.299+d[i+1]*.587+d[i+2]*.114)/255;
      const r=Math.pow(1-lum,.55)*cell*.58;
      if(r<.15)continue;
      ox.beginPath();ox.arc(rx,ry,r,0,Math.PI*2);
      ox.fillStyle=color?`rgb(${d[i]},${d[i+1]},${d[i+2]})`:'#111';
      ox.fill();
    }
  }
  return out;
}

function posterizeEffect(input,e){
  const levels=getParam(e,'Levels');
  const mix=getParam(e,'Mix')/100;
  const c=document.createElement('canvas');c.width=c.height=input.width;
  const cx=c.getContext('2d',{willReadFrequently:true});cx.drawImage(input,0,0);
  const img=cx.getImageData(0,0,c.width,c.height),d=img.data;
  for(let i=0;i<d.length;i+=4){
    for(let k=0;k<3;k++){
      const q=Math.round(d[i+k]/255*(levels-1))*255/(levels-1);
      d[i+k]=d[i+k]*(1-mix)+q*mix;
    }
  }
  cx.putImageData(img,0,0);return c;
}

function rgbEffect(input,e){
  const split=getParam(e,'Split'),scan=getParam(e,'Scan')/100;
  const w=input.width,c=document.createElement('canvas');c.width=c.height=w;
  const cx=c.getContext('2d');cx.globalCompositeOperation='screen';
  cx.globalAlpha=.92;cx.drawImage(input,-split,0);cx.globalAlpha=.78;cx.drawImage(input,split,0);
  cx.globalCompositeOperation='source-over';cx.globalAlpha=1;
  if(scan>0){cx.fillStyle=`rgba(0,0,0,${scan*.42})`;for(let y=1;y<w;y+=3)cx.fillRect(0,y,w,1)}
  return c;
}

function noiseEffect(input,e){
  const amount=getParam(e,'Amount')/100,mono=getParam(e,'Mono')>0;
  const c=document.createElement('canvas');c.width=c.height=input.width;
  const cx=c.getContext('2d',{willReadFrequently:true});cx.drawImage(input,0,0);
  const img=cx.getImageData(0,0,c.width,c.height),d=img.data;
  for(let i=0;i<d.length;i+=4){
    const n=(Math.random()-.5)*255*amount;
    d[i]=clamp(d[i]+n,0,255);
    d[i+1]=clamp(d[i+1]+(mono?n:(Math.random()-.5)*255*amount),0,255);
    d[i+2]=clamp(d[i+2]+(mono?n:(Math.random()-.5)*255*amount),0,255);
  }
  cx.putImageData(img,0,0);return c;
}

function invertEffect(input,e){
  const mix=getParam(e,'Mix')/100;
  const c=document.createElement('canvas');c.width=c.height=input.width;
  const cx=c.getContext('2d',{willReadFrequently:true});cx.drawImage(input,0,0);
  const img=cx.getImageData(0,0,c.width,c.height),d=img.data;
  for(let i=0;i<d.length;i+=4)for(let k=0;k<3;k++)d[i+k]=d[i+k]*(1-mix)+(255-d[i+k])*mix;
  cx.putImageData(img,0,0);return c;
}

function applyEffect(input,e){
  if(e.name==='DITHER')return ditherEffect(input,e);
  if(e.name==='HALFTONE')return halftoneEffect(input,e);
  if(e.name==='POSTERIZE')return posterizeEffect(input,e);
  if(e.name==='RGB')return rgbEffect(input,e);
  if(e.name==='NOISE')return noiseEffect(input,e);
  if(e.name==='INVERT')return invertEffect(input,e);
  return input;
}

function renderProcessed(size){
  let img=sourceSquare(size);

  // Preview the currently selected effect immediately.
  // If it already exists in the stack, replace that stack entry with the live values.
  const active=copyEffect(current());
  let activeUsed=false;

  for(const e of stack){
    if(e.name===active.name){
      img=applyEffect(img,active);
      activeUsed=true;
    }else{
      img=applyEffect(img,e);
    }
  }

  if(!activeUsed) img=applyEffect(img,active);
  return img;
}

function render(){
  renderPending=false;
  const size=Math.min(520,preview.width);
  const processed=renderProcessed(size);
  pctx.clearRect(0,0,preview.width,preview.height);
  pctx.imageSmoothingEnabled=false;
  pctx.drawImage(processed,0,0,preview.width,preview.height);
  if(stream&&!frozen)requestAnimationFrame(requestRender);
}

function requestRender(){
  if(renderPending)return;
  renderPending=true;
  requestAnimationFrame(render);
}

function updateUI(){
  document.getElementById('effectName').textContent=current().name;
  document.getElementById('effectDots').innerHTML=EFFECTS.map((_,i)=>`<span class="${i===selected?'active':''}">●</span>`).join(' ');
  tickRing.style.transform=`rotate(${dialDegrees}deg)`;

  const panel=document.getElementById('paramsPanel');
  panel.innerHTML='';
  current().params.forEach((p,index)=>{
    const row=document.createElement('div');row.className='paramRow';
    row.innerHTML=`
      <div class="paramText"><strong>${p.name}</strong><small>${p.min}–${p.max}</small></div>
      <button class="step" data-i="${index}" data-d="-1">−</button>
      <input class="range" type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.value}" data-i="${index}">
      <button class="step" data-i="${index}" data-d="1">＋</button>
      <div class="value">${p.value}</div>`;
    panel.appendChild(row);
  });
  panel.querySelectorAll('.step').forEach(btn=>btn.onclick=()=>{
    const p=current().params[Number(btn.dataset.i)];
    p.value=clamp(p.value+Number(btn.dataset.d)*p.step,p.min,p.max);

    const existing=stack.findIndex(e=>e.name===current().name);
    if(existing>=0) stack[existing]=copyEffect(current());

    updateUI();
    requestRender();
  });
  panel.querySelectorAll('.range').forEach(sl=>sl.oninput=()=>{
    const p=current().params[Number(sl.dataset.i)];
    p.value=Number(sl.value);
    sl.closest('.paramRow').querySelector('.value').textContent=p.value;

    const existing=stack.findIndex(e=>e.name===current().name);
    if(existing>=0) stack[existing]=copyEffect(current());

    requestRender();
  });

  const stackEl=document.getElementById('stack');stackEl.innerHTML='';
  stack.forEach((e,i)=>{
    const wrapper=document.createElement('div');
    wrapper.className='card';

    const content=document.createElement('button');
    content.className='cardContent';
    content.type='button';
    content.innerHTML=`<strong>${i+1} ${e.name}</strong>${e.params.slice(0,3).map(p=>`${p.name[0]} ${p.value}`).join(' · ')}`;
    content.onclick=()=>{
      selected=EFFECTS.findIndex(x=>x.name===e.name);
      EFFECTS[selected].params=e.params.map(p=>({...p}));
      updateUI();
      requestRender();
    };

    const del=document.createElement('button');
    del.className='effectDelete';
    del.type='button';
    del.setAttribute('aria-label',`Delete ${e.name}`);
    del.textContent='×';
    del.onclick=(event)=>{
      event.stopPropagation();
      stack.splice(i,1);
      updateUI();
      requestRender();
      setStatus('Effect deleted');
    };

    wrapper.appendChild(content);
    wrapper.appendChild(del);
    stackEl.appendChild(wrapper);
  });
  if(stack.length<3){
    const add=document.createElement('button');add.className='card add';add.textContent='＋';
    add.onclick=addCurrentEffect;stackEl.appendChild(add);
  }
  document.getElementById('stackCount').textContent=`(${stack.length}/3)`;
}

function selectEffect(delta){
  selected=(selected+delta+EFFECTS.length)%EFFECTS.length;
  dialDegrees-=delta*(360/EFFECTS.length);
  updateUI();
}

function addCurrentEffect(){
  const copy=copyEffect(current());
  const existing=stack.findIndex(e=>e.name===copy.name);
  if(existing>=0)stack[existing]=copy;
  else if(stack.length<3)stack.push(copy);
  else{setStatus('Maximum 3 effects');return}
  updateUI();requestRender();
}

function randomRecipe(){
  const pool=EFFECTS.map(copyEffect).sort(()=>Math.random()-.5);
  const count=1+Math.floor(Math.random()*3);
  stack=pool.slice(0,count);
  stack.forEach(e=>e.params.forEach(p=>p.value=Math.round(p.min+Math.random()*(p.max-p.min))));
  updateUI();requestRender();setStatus(`Random ${count}/3`);
}

function pointAngle(e){
  const r=dialStage.getBoundingClientRect();
  return Math.atan2(e.clientY-(r.top+r.height/2),e.clientX-(r.left+r.width/2));
}
function angleDelta(a,b){
  let d=a-b;
  while(d>Math.PI)d-=Math.PI*2;
  while(d<-Math.PI)d+=Math.PI*2;
  return d;
}
dialStage.addEventListener('pointerdown',e=>{
  if(e.target.closest('.screenAction')) return;
  dialStage.style.cursor='grabbing';
  dragging=true;
  dialPointerMoved=false;
  dialHoldTriggered=false;
  lastAngle=pointAngle(e);
  accumulated=0;
  dialStage.setPointerCapture(e.pointerId);

  clearTimeout(dialHoldTimer);
  dialHoldTimer=setTimeout(()=>{
    if(!dialPointerMoved){
      dialHoldTriggered=true;
      resetAllState();
      document.getElementById('holdRing').classList.add('active');
      setTimeout(()=>document.getElementById('holdRing').classList.remove('active'),220);
      try{navigator.vibrate?.([45,35,45])}catch(_){}
    }
  },760);
});
dialStage.addEventListener('pointermove',e=>{
  if(!dragging || dialHoldTriggered)return;

  const events=e.getCoalescedEvents?.() || [e];
  for(const ev of events){
    const a=pointAngle(ev);
    let d=angleDelta(a,lastAngle);

    if(Math.abs(d)>0.45){
      lastAngle=a;
      continue;
    }

    lastAngle=a;

    if(Math.abs(d)>.004){
      dialPointerMoved=true;
      clearTimeout(dialHoldTimer);
    }

    accumulated+=d;
    dialDegrees+=d*180/Math.PI;
    tickRing.style.transform=`rotate(${dialDegrees}deg)`;

    const step=Math.PI/9;
    while(Math.abs(accumulated)>=step){
      const dir=accumulated>0?1:-1;
      accumulated-=dir*step;
      selectEffect(dir);
    }
  }
});
function finishDialPointer(){
  dialStage.style.cursor='grab';
  dragging=false;
  clearTimeout(dialHoldTimer);
}
dialStage.addEventListener('pointerup',finishDialPointer);
dialStage.addEventListener('pointercancel',finishDialPointer);

async function startCamera(){
  try{
    stream?.getTracks().forEach(t=>t.stop());
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:facingMode},width:{ideal:1920},height:{ideal:1920}},
      audio:false
    });
    video.srcObject=stream;
    await video.play();
    frozen=false;
    setStatus('Camera active');
    requestRender();
  }catch(err){
    console.error(err);setStatus('Camera permission or HTTPS required',2600);
  }
}

document.getElementById('uploadLabel').addEventListener('pointerdown',e=>e.stopPropagation());
document.getElementById('uploadLabel').addEventListener('click',e=>e.stopPropagation());

fileInput.addEventListener('change',async()=>{
  const file=fileInput.files?.[0];
  if(!file)return;
  try{
    const bitmap=await createImageBitmap(file);
    stream?.getTracks().forEach(t=>t.stop());stream=null;
    source.width=bitmap.width;source.height=bitmap.height;
    sctx.clearRect(0,0,source.width,source.height);sctx.drawImage(bitmap,0,0);
    bitmap.close?.();
    frozen=true;
    setStatus('Photo loaded');
    requestRender();
  }catch(err){
    const img=new Image();
    img.onload=()=>{
      source.width=img.naturalWidth;source.height=img.naturalHeight;
      sctx.drawImage(img,0,0);URL.revokeObjectURL(img.src);
      frozen=true;setStatus('Photo loaded');requestRender();
    };
    img.onerror=()=>setStatus('Could not open image');
    img.src=URL.createObjectURL(file);
  }
  fileInput.value='';
});

async function saveImage(){
  try{
    updateVideoSource();

    const sourceSide=Math.max(
      512,
      Math.min(source.width||0,source.height||0) ||
      Math.round(Math.min(window.innerWidth,window.innerHeight)*(window.devicePixelRatio||1))
    );
    const exportSize=clamp(sourceSide,512,4096);
    const processSize=Math.min(exportSize,1200);
    const processed=renderProcessed(processSize);

    const out=document.createElement('canvas');
    out.width=out.height=exportSize;
    const ox=out.getContext('2d');
    ox.clearRect(0,0,exportSize,exportSize);
    ox.save();
    ox.beginPath();
    ox.arc(exportSize/2,exportSize/2,exportSize/2,0,Math.PI*2);
    ox.clip();
    ox.imageSmoothingEnabled=false;
    ox.drawImage(processed,0,0,exportSize,exportSize);
    ox.restore();

    const blob=await new Promise(resolve=>out.toBlob(resolve,'image/png'));
    if(!blob) throw new Error('PNG creation failed');

    const filename=`fk17_oko_${exportSize}.png`;
    const file=new File([blob],filename,{type:'image/png'});

    // On iPhone, Share is more reliable than an automatic file download.
    if(navigator.canShare?.({files:[file]}) && navigator.share){
      await navigator.share({files:[file],title:'FK17 OKO'});
      setStatus(`Saved ${exportSize}×${exportSize}`);
      return;
    }

    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=filename;
    a.style.display='none';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    setStatus(`Saved ${exportSize}×${exportSize}`);
  }catch(err){
    console.error(err);
    setStatus('Save failed — try Safari Share',2600);
  }
}

async function toggleRecording(){
  if(recording){
    recorder?.stop();return;
  }
  if(!preview.captureStream||!window.MediaRecorder){
    setStatus('Recording is not supported in this browser');return;
  }
  try{
    const cs=preview.captureStream(30);
    const type=['video/mp4','video/webm;codecs=vp9','video/webm'].find(t=>MediaRecorder.isTypeSupported(t))||'';
    recorder=new MediaRecorder(cs,type?{mimeType:type}:undefined);chunks=[];
    recorder.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};
    recorder.onstop=()=>{
      const blob=new Blob(chunks,{type:recorder.mimeType||'video/webm'});
      const ext=blob.type.includes('mp4')?'mp4':'webm';
      const url=URL.createObjectURL(blob),a=document.createElement('a');
      a.href=url;a.download=`fk17_oko_recording.${ext}`;a.click();
      setTimeout(()=>URL.revokeObjectURL(url),2000);
      recording=false;
      setStatus('Recording saved');
    };
    recorder.start();
    recording=true;
    setStatus('Recording — hold shutter again to stop');
  }catch(err){console.error(err);setStatus('Recording failed')}
}

document.getElementById('prevEffect').onclick=()=>selectEffect(-1);
document.getElementById('nextEffect').onclick=()=>selectEffect(1);
document.getElementById('randomButton').onclick=randomRecipe;
document.getElementById('cameraButton').onclick=async()=>{
  facingMode=facingMode==='user'?'environment':'user';
  document.getElementById('cameraButton').innerHTML=`↺<span>${facingMode==='user'?'Front Camera':'Back Camera'}</span>`;
  await startCamera();
};

document.getElementById('saveButton').onclick=saveImage;

// Shutter: short press captures/saves a photo; long press starts/stops video.
const shutter=document.getElementById('shutterButton');

shutter.addEventListener('pointerdown',e=>{
  e.preventDefault();
  shutterPointerDown=true;
  shutterHoldTriggered=false;
  shutter.setPointerCapture(e.pointerId);
  clearTimeout(shutterHoldTimer);

  shutterHoldTimer=setTimeout(async()=>{
    if(!shutterPointerDown)return;
    shutterHoldTriggered=true;

    if(!stream){
      await startCamera();
      if(!stream)return;
    }

    await toggleRecording();
    try{navigator.vibrate?.(35)}catch(_){}
  },700);
});

shutter.addEventListener('pointerup',e=>{
  e.preventDefault();
  shutterPointerDown=false;
  clearTimeout(shutterHoldTimer);

  if(shutterHoldTriggered)return;

  // Freeze the current live frame before saving the photo.
  if(stream){
    updateVideoSource();
    frozen=true;
  }
  saveImage();
  requestRender();
});

shutter.addEventListener('pointercancel',()=>{
  shutterPointerDown=false;
  clearTimeout(shutterHoldTimer);
});
function resetAllState(){
  stack=[];
  selected=0;
  dialDegrees=0;
  frozen=false;

  EFFECTS.forEach((e,ei)=>e.params.forEach((p,pi)=>p.value=[
    [5,52,68],[7,50,0],[5,100],[8,25],[25,1],[100]
  ][ei][pi]));

  tickRing.style.transform='rotate(0deg)';
  updateUI();
  requestRender();
  setStatus('Reset');
}

document.getElementById('resetButton').onclick=resetAllState;
window.addEventListener('resize',resizePreview);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)requestRender()});

buildTicks();
makeDefault();
updateUI();
resizePreview();
</script>
